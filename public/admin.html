<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Whidbey Dashboard Admin</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #08111f;
      --card: #0c1a2e;
      --text: #e5eefb;
      --dim: #94a3b8;
      --accent: #38bdf8;
      --danger: #f87171;
      --border: rgba(148,163,184,0.22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 1.5rem;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    h1, h2 {
      margin: 0;
      letter-spacing: 0;
      color: var(--accent);
    }
    h1 { font-size: 1.4rem; }
    h2 {
      font-size: 1rem;
      margin-bottom: 0.85rem;
    }
    .app-version {
      color: var(--dim);
      font-size: 0.85rem;
      font-weight: 500;
      margin-left: 0.35rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    section {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      color: var(--dim);
      font-size: 0.8rem;
      margin-bottom: 0.35rem;
    }
    input, textarea, button {
      font: inherit;
      border-radius: 0.4rem;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #07101d;
      color: var(--text);
      padding: 0.65rem 0.7rem;
      outline: none;
    }
    textarea {
      min-height: 5.5rem;
      resize: vertical;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
    }
    button {
      border: 1px solid rgba(56,189,248,0.45);
      background: rgba(56,189,248,0.16);
      color: var(--text);
      padding: 0.55rem 0.85rem;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      background: rgba(56,189,248,0.24);
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    button.delete {
      border-color: rgba(248,113,113,0.45);
      background: rgba(248,113,113,0.13);
      color: #fecaca;
      flex: 0 0 auto;
    }
    button.text-link {
      border: 0;
      background: transparent;
      color: var(--accent);
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 0.18em;
    }
    button.text-link:hover:not(:disabled) {
      background: transparent;
      color: #7dd3fc;
    }
    .field {
      margin-bottom: 0.85rem;
    }
    .actions, .auth-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .status, .signed-in {
      color: var(--dim);
      font-size: 0.85rem;
    }
    .status.error {
      color: var(--danger);
    }
    .message-list, .context-list {
      display: grid;
      gap: 0.65rem;
    }
    .message-row, .context-row {
      display: grid;
      gap: 0.65rem;
      border: 1px solid var(--border);
      border-radius: 0.45rem;
      padding: 0.7rem;
      background: rgba(255,255,255,0.025);
    }
    .item-view {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .message-text, .context-text {
      overflow-wrap: anywhere;
      line-height: 1.35;
      min-width: 0;
    }
    .context-query {
      color: var(--accent);
      font-weight: 700;
    }
    .context-meta {
      color: var(--dim);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
    .edit-form {
      border-top: 1px solid var(--border);
      padding-top: 0.65rem;
    }
    .empty {
      color: var(--dim);
      padding: 0.4rem 0;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Admin <span id="app-version" class="app-version"></span></h1>
      <a href="/">Dashboard</a>
    </header>

    <section>
      <h2>Sign In</h2>
      <div class="auth-row">
        <button id="sign-in" class="text-link" type="button">Sign in</button>
        <span id="signed-in" class="signed-in"></span>
        <button id="sign-out" class="hidden" type="button">Sign out</button>
      </div>
      <div id="auth-status" class="status" role="status"></div>
    </section>

    <section id="messages-panel" class="hidden">
      <h2>Crawl Messages</h2>
      <form id="message-form">
        <div class="field">
          <label for="text">Message</label>
          <textarea id="text" name="text" maxlength="280" required></textarea>
        </div>
        <div class="actions">
          <button id="save-message" type="submit">OK</button>
          <span id="status" class="status" role="status"></span>
        </div>
      </form>
    </section>

    <section id="alert-context-panel" class="hidden">
      <h2>Ferry Alert Parentheticals</h2>
      <form id="alert-context-form">
        <div class="field">
          <label for="alert-query">Query substring</label>
          <input id="alert-query" name="query" maxlength="160" required>
        </div>
        <div class="field">
          <label for="alert-info">Parenthetical text</label>
          <textarea id="alert-info" name="additionalInfo" maxlength="220" required></textarea>
        </div>
        <div class="field">
          <label for="alert-color">Color</label>
          <input id="alert-color" name="color" maxlength="80" placeholder="Any CSS color, e.g. var(--danger), #f59e0b, orange">
        </div>
        <div class="actions">
          <button id="save-alert-context" type="submit">OK</button>
          <span id="alert-context-status" class="status" role="status"></span>
        </div>
      </form>
    </section>

    <section>
      <h2>Current Crawl Messages</h2>
      <div id="message-list" class="message-list">
        <div class="empty">Loading...</div>
      </div>
    </section>

    <section>
      <h2>Current Ferry Alert Parentheticals</h2>
      <div id="alert-context-list" class="context-list">
        <div class="empty">Loading...</div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('message-form');
    const textEl = document.getElementById('text');
    const listEl = document.getElementById('message-list');
    const statusEl = document.getElementById('status');
    const alertContextForm = document.getElementById('alert-context-form');
    const alertQueryEl = document.getElementById('alert-query');
    const alertInfoEl = document.getElementById('alert-info');
    const alertColorEl = document.getElementById('alert-color');
    const alertContextListEl = document.getElementById('alert-context-list');
    const alertContextStatusEl = document.getElementById('alert-context-status');
    const authStatusEl = document.getElementById('auth-status');
    const signedInEl = document.getElementById('signed-in');
    const signInButton = document.getElementById('sign-in');
    const signOutButton = document.getElementById('sign-out');
    const messagesPanel = document.getElementById('messages-panel');
    const alertContextPanel = document.getElementById('alert-context-panel');
    const versionEl = document.getElementById('app-version');

    let googleCredential = '';
    let signedInEmail = '';

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function setStatus(message, error = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', error);
    }

    function setAlertContextStatus(message, error = false) {
      alertContextStatusEl.textContent = message;
      alertContextStatusEl.classList.toggle('error', error);
    }

    function setAuthStatus(message, error = false) {
      authStatusEl.textContent = message;
      authStatusEl.classList.toggle('error', error);
    }

    function showRowEditor(row, formClass) {
      row.querySelector(`.${formClass}`)?.classList.remove('hidden');
      row.querySelector('.item-view')?.classList.add('hidden');
    }

    function hideRowEditor(row, formClass) {
      row.querySelector(`.${formClass}`)?.classList.add('hidden');
      row.querySelector('.item-view')?.classList.remove('hidden');
    }

    function setSignedInEmail(email) {
      googleCredential = '';
      signedInEmail = email || '';
      signedInEl.textContent = signedInEmail ? `Signed in as ${signedInEmail}` : 'Signed in';
      messagesPanel.classList.remove('hidden');
      alertContextPanel.classList.remove('hidden');
      signOutButton.classList.remove('hidden');
      signInButton.classList.add('hidden');
      setAuthStatus('');
    }

    function setSignedOut(message = '') {
      googleCredential = '';
      signedInEmail = '';
      signedInEl.textContent = '';
      messagesPanel.classList.add('hidden');
      alertContextPanel.classList.add('hidden');
      signOutButton.classList.add('hidden');
      signInButton.classList.remove('hidden');
      setAuthStatus(message);
    }

    async function jsonFetch(url, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (googleCredential) headers.Authorization = `Bearer ${googleCredential}`;
      const res = await fetch(url, { ...options, credentials: 'same-origin', headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    async function createAdminSession(credential) {
      googleCredential = credential || '';
      const data = await jsonFetch('/api/admin/session', { method: 'POST' });
      googleCredential = '';
      setSignedInEmail(data.admin?.email || '');
      return data;
    }

    async function restoreAdminSession() {
      try {
        const data = await jsonFetch('/api/admin/session');
        if (data.signedIn) {
          setSignedInEmail(data.admin?.email || '');
          return true;
        }
      } catch {
        setSignedOut('');
      }
      return false;
    }

    function renderMessages(messages = []) {
      if (!messages.length) {
        listEl.innerHTML = '<div class="empty">No user messages in the crawl.</div>';
        return;
      }
      listEl.innerHTML = messages.map(message => `
        <div class="message-row" data-id="${escapeHtml(message.id)}">
          <div class="item-view">
            <div class="message-text">${escapeHtml(message.text)}</div>
            <div class="actions">
              <button class="edit" type="button" ${signedInEmail ? '' : 'disabled'}>Edit</button>
              <button class="delete" type="button" ${signedInEmail ? '' : 'disabled'}>Delete</button>
            </div>
          </div>
          <form class="message-edit edit-form hidden">
            <div class="field">
              <label for="message-edit-${escapeHtml(message.id)}">Message</label>
              <textarea id="message-edit-${escapeHtml(message.id)}" name="text" maxlength="280" ${signedInEmail ? '' : 'disabled'} required>${escapeHtml(message.text)}</textarea>
            </div>
            <div class="actions">
              <button type="submit" ${signedInEmail ? '' : 'disabled'}>Save</button>
              <button class="cancel" type="button">Cancel</button>
            </div>
          </form>
        </div>
      `).join('');
    }

    async function loadMessages() {
      try {
        const data = await jsonFetch('/api/messages');
        renderMessages(data.messages || []);
      } catch (e) {
        listEl.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
      }
    }

    function renderAlertContexts(contexts = []) {
      if (!contexts.length) {
        alertContextListEl.innerHTML = '<div class="empty">No ferry alert parentheticals.</div>';
        return;
      }
      alertContextListEl.innerHTML = contexts.map(context => `
        <div class="context-row" data-id="${escapeHtml(context.id)}">
          <div class="item-view">
            <div class="context-text">
              <div><span class="context-query">${escapeHtml(context.query)}</span> → ${escapeHtml(context.additionalInfo)}</div>
              ${context.color ? `<div class="context-meta">Color: ${escapeHtml(context.color)}</div>` : ''}
            </div>
            <div class="actions">
              <button class="edit" type="button" ${signedInEmail ? '' : 'disabled'}>Edit</button>
              <button class="delete" type="button" ${signedInEmail ? '' : 'disabled'}>Delete</button>
            </div>
          </div>
          <form class="context-edit edit-form hidden">
            <div class="field">
              <label for="context-query-${escapeHtml(context.id)}">Query substring</label>
              <input id="context-query-${escapeHtml(context.id)}" name="query" maxlength="160" value="${escapeHtml(context.query)}" ${signedInEmail ? '' : 'disabled'} required>
            </div>
            <div class="field">
              <label for="context-info-${escapeHtml(context.id)}">Parenthetical text</label>
              <textarea id="context-info-${escapeHtml(context.id)}" name="additionalInfo" maxlength="220" ${signedInEmail ? '' : 'disabled'} required>${escapeHtml(context.additionalInfo)}</textarea>
            </div>
            <div class="field">
              <label for="context-color-${escapeHtml(context.id)}">Color</label>
              <input id="context-color-${escapeHtml(context.id)}" name="color" maxlength="80" value="${escapeHtml(context.color || '')}" placeholder="Any CSS color" ${signedInEmail ? '' : 'disabled'}>
            </div>
            <div class="actions">
              <button type="submit" ${signedInEmail ? '' : 'disabled'}>Save</button>
              <button class="cancel" type="button">Cancel</button>
            </div>
          </form>
        </div>
      `).join('');
    }

    async function loadAlertContexts() {
      try {
        const data = await jsonFetch('/api/alert-contexts');
        renderAlertContexts(data.contexts || []);
      } catch (e) {
        alertContextListEl.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
      }
    }

    async function initGoogleSignIn() {
      const cfg = await jsonFetch('/api/config');
      versionEl.textContent = cfg.version ? `v${cfg.version}` : '';
      const restored = await restoreAdminSession();
      if (restored) {
        await loadMessages();
        await loadAlertContexts();
      }
      if (!cfg.googleClientId) {
        if (!restored) setSignedOut('Google Sign-In is not configured yet.');
        return;
      }
      const start = () => {
        if (!window.google?.accounts?.id) {
          setTimeout(start, 100);
          return;
        }
        google.accounts.id.initialize({
          client_id: cfg.googleClientId,
          callback: async response => {
            setAuthStatus('Signing in...');
            try {
              await createAdminSession(response.credential);
              await loadMessages();
              await loadAlertContexts();
            } catch (e) {
              googleCredential = '';
              setSignedOut(e.message);
            }
          },
        });
        signInButton.disabled = false;
      };
      start();
    }

    signInButton.addEventListener('click', () => {
      if (!window.google?.accounts?.id) {
        setAuthStatus('Google Sign-In is still loading.', true);
        return;
      }
      setAuthStatus('Opening sign-in...');
      google.accounts.id.prompt(notification => {
        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
          setAuthStatus('Google could not open the sign-in prompt. Refresh and try again.', true);
        }
      });
    });

    form.addEventListener('submit', async event => {
      event.preventDefault();
      if (!signedInEmail) {
        setStatus('Sign in with Google first.', true);
        return;
      }
      setStatus('Saving...');
      try {
        await jsonFetch('/api/messages', {
          method: 'POST',
          body: JSON.stringify({ text: textEl.value }),
        });
        textEl.value = '';
        setStatus('Saved.');
        await loadMessages();
      } catch (e) {
        setStatus(e.message, true);
      }
    });

    listEl.addEventListener('click', async event => {
      const button = event.target.closest('button');
      if (!button || button.disabled) return;
      const row = button.closest('.message-row');
      if (!row) return;
      if (button.classList.contains('edit')) {
        showRowEditor(row, 'message-edit');
        return;
      }
      if (button.classList.contains('cancel')) {
        hideRowEditor(row, 'message-edit');
        return;
      }
      if (!button.classList.contains('delete')) return;
      setStatus('Deleting...');
      try {
        await jsonFetch(`/api/messages/${encodeURIComponent(row.dataset.id)}`, {
          method: 'DELETE',
        });
        setStatus('Deleted.');
        await loadMessages();
      } catch (e) {
        setStatus(e.message, true);
      }
    });

    listEl.addEventListener('submit', async event => {
      const form = event.target.closest('.message-edit');
      if (!form) return;
      event.preventDefault();
      if (!signedInEmail) {
        setStatus('Sign in with Google first.', true);
        return;
      }
      const row = form.closest('.message-row');
      const formData = new FormData(form);
      setStatus('Saving...');
      try {
        await jsonFetch(`/api/messages/${encodeURIComponent(row.dataset.id)}`, {
          method: 'PUT',
          body: JSON.stringify({ text: formData.get('text') }),
        });
        setStatus('Saved.');
        await loadMessages();
      } catch (e) {
        setStatus(e.message, true);
      }
    });

    alertContextForm.addEventListener('submit', async event => {
      event.preventDefault();
      if (!signedInEmail) {
        setAlertContextStatus('Sign in with Google first.', true);
        return;
      }
      setAlertContextStatus('Saving...');
      try {
        await jsonFetch('/api/alert-contexts', {
          method: 'POST',
          body: JSON.stringify({
            query: alertQueryEl.value,
            additionalInfo: alertInfoEl.value,
            color: alertColorEl.value,
          }),
        });
        alertQueryEl.value = '';
        alertInfoEl.value = '';
        alertColorEl.value = '';
        setAlertContextStatus('Saved.');
        await loadAlertContexts();
      } catch (e) {
        setAlertContextStatus(e.message, true);
      }
    });

    alertContextListEl.addEventListener('submit', async event => {
      const form = event.target.closest('.context-edit');
      if (!form) return;
      event.preventDefault();
      if (!signedInEmail) {
        setAlertContextStatus('Sign in with Google first.', true);
        return;
      }
      const row = form.closest('.context-row');
      const formData = new FormData(form);
      setAlertContextStatus('Saving...');
      try {
        await jsonFetch(`/api/alert-contexts/${encodeURIComponent(row.dataset.id)}`, {
          method: 'PUT',
          body: JSON.stringify({
            query: formData.get('query'),
            additionalInfo: formData.get('additionalInfo'),
            color: formData.get('color'),
          }),
        });
        setAlertContextStatus('Saved.');
        await loadAlertContexts();
      } catch (e) {
        setAlertContextStatus(e.message, true);
      }
    });

    alertContextListEl.addEventListener('click', async event => {
      const button = event.target.closest('button');
      if (!button || button.disabled) return;
      const row = button.closest('.context-row');
      if (!row) return;
      if (button.classList.contains('edit')) {
        showRowEditor(row, 'context-edit');
        return;
      }
      if (button.classList.contains('cancel')) {
        hideRowEditor(row, 'context-edit');
        return;
      }
      if (!button.classList.contains('delete')) return;
      setAlertContextStatus('Deleting...');
      try {
        await jsonFetch(`/api/alert-contexts/${encodeURIComponent(row.dataset.id)}`, {
          method: 'DELETE',
        });
        setAlertContextStatus('Deleted.');
        await loadAlertContexts();
      } catch (e) {
        setAlertContextStatus(e.message, true);
      }
    });

    signOutButton.addEventListener('click', async () => {
      try {
        await jsonFetch('/api/admin/session', { method: 'DELETE' });
      } catch {}
      window.google?.accounts?.id?.disableAutoSelect();
      setSignedOut('Signed out.');
      await loadMessages();
      await loadAlertContexts();
    });

    loadMessages();
    loadAlertContexts();
    initGoogleSignIn().catch(e => setAuthStatus(e.message, true));
  </script>
</body>
</html>
