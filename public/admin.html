<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Whidbey Dashboard Admin</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #08111f;
      --card: #0c1a2e;
      --text: #e5eefb;
      --dim: #94a3b8;
      --accent: #38bdf8;
      --danger: #f87171;
      --border: rgba(148,163,184,0.22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 1.5rem;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    h1, h2 {
      margin: 0;
      letter-spacing: 0;
      color: var(--accent);
    }
    h1 { font-size: 1.4rem; }
    h2 {
      font-size: 1rem;
      margin-bottom: 0.85rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    section {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      color: var(--dim);
      font-size: 0.8rem;
      margin-bottom: 0.35rem;
    }
    textarea, button {
      font: inherit;
      border-radius: 0.4rem;
    }
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #07101d;
      color: var(--text);
      padding: 0.65rem 0.7rem;
      min-height: 5.5rem;
      outline: none;
      resize: vertical;
    }
    textarea:focus {
      border-color: var(--accent);
    }
    button {
      border: 1px solid rgba(56,189,248,0.45);
      background: rgba(56,189,248,0.16);
      color: var(--text);
      padding: 0.55rem 0.85rem;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      background: rgba(56,189,248,0.24);
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    button.delete {
      border-color: rgba(248,113,113,0.45);
      background: rgba(248,113,113,0.13);
      color: #fecaca;
      flex: 0 0 auto;
    }
    .field {
      margin-bottom: 0.85rem;
    }
    .actions, .auth-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .status, .signed-in {
      color: var(--dim);
      font-size: 0.85rem;
    }
    .status.error {
      color: var(--danger);
    }
    .message-list {
      display: grid;
      gap: 0.65rem;
    }
    .message-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border: 1px solid var(--border);
      border-radius: 0.45rem;
      padding: 0.7rem;
      background: rgba(255,255,255,0.025);
    }
    .message-text {
      overflow-wrap: anywhere;
      line-height: 1.35;
    }
    .empty {
      color: var(--dim);
      padding: 0.4rem 0;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Admin</h1>
      <a href="/">Dashboard</a>
    </header>

    <section>
      <h2>Sign In</h2>
      <div class="auth-row">
        <div id="google-signin"></div>
        <span id="signed-in" class="signed-in"></span>
        <button id="sign-out" class="hidden" type="button">Sign out</button>
      </div>
      <div id="auth-status" class="status" role="status"></div>
    </section>

    <section id="messages-panel" class="hidden">
      <h2>Crawl Messages</h2>
      <form id="message-form">
        <div class="field">
          <label for="text">Message</label>
          <textarea id="text" name="text" maxlength="280" required></textarea>
        </div>
        <div class="actions">
          <button id="save-message" type="submit">OK</button>
          <span id="status" class="status" role="status"></span>
        </div>
      </form>
    </section>

    <section>
      <h2>Current Crawl Messages</h2>
      <div id="message-list" class="message-list">
        <div class="empty">Loading...</div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('message-form');
    const textEl = document.getElementById('text');
    const listEl = document.getElementById('message-list');
    const statusEl = document.getElementById('status');
    const authStatusEl = document.getElementById('auth-status');
    const signedInEl = document.getElementById('signed-in');
    const signOutButton = document.getElementById('sign-out');
    const messagesPanel = document.getElementById('messages-panel');
    const signInContainer = document.getElementById('google-signin');

    let googleCredential = '';
    let signedInEmail = '';

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function decodeJwtPayload(token) {
      try {
        const raw = token.split('.')[1] || '';
        const payload = raw.padEnd(raw.length + ((4 - (raw.length % 4)) % 4), '=');
        const json = atob(payload.replace(/-/g, '+').replace(/_/g, '/'));
        return JSON.parse(decodeURIComponent(escape(json)));
      } catch {
        return {};
      }
    }

    function setStatus(message, error = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', error);
    }

    function setAuthStatus(message, error = false) {
      authStatusEl.textContent = message;
      authStatusEl.classList.toggle('error', error);
    }

    function setSignedIn(credential) {
      googleCredential = credential || '';
      const payload = decodeJwtPayload(googleCredential);
      signedInEmail = payload.email || '';
      signedInEl.textContent = signedInEmail ? `Signed in as ${signedInEmail}` : 'Signed in';
      messagesPanel.classList.remove('hidden');
      signOutButton.classList.remove('hidden');
      signInContainer.classList.add('hidden');
      setAuthStatus('');
    }

    function setSignedOut(message = '') {
      googleCredential = '';
      signedInEmail = '';
      signedInEl.textContent = '';
      messagesPanel.classList.add('hidden');
      signOutButton.classList.add('hidden');
      signInContainer.classList.remove('hidden');
      setAuthStatus(message);
    }

    async function jsonFetch(url, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (googleCredential) headers.Authorization = `Bearer ${googleCredential}`;
      const res = await fetch(url, { ...options, headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    function renderMessages(messages = []) {
      if (!messages.length) {
        listEl.innerHTML = '<div class="empty">No user messages in the crawl.</div>';
        return;
      }
      listEl.innerHTML = messages.map(message => `
        <div class="message-row" data-id="${escapeHtml(message.id)}">
          <div class="message-text">${escapeHtml(message.text)}</div>
          <button class="delete" type="button" data-id="${escapeHtml(message.id)}" ${googleCredential ? '' : 'disabled'}>Delete</button>
        </div>
      `).join('');
    }

    async function loadMessages() {
      try {
        const data = await jsonFetch('/api/messages');
        renderMessages(data.messages || []);
      } catch (e) {
        listEl.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
      }
    }

    async function initGoogleSignIn() {
      const cfg = await jsonFetch('/api/config');
      if (!cfg.googleClientId) {
        setSignedOut('Google Sign-In is not configured yet.');
        return;
      }
      const start = () => {
        if (!window.google?.accounts?.id) {
          setTimeout(start, 100);
          return;
        }
        google.accounts.id.initialize({
          client_id: cfg.googleClientId,
          callback: response => {
            setSignedIn(response.credential);
            loadMessages();
          },
        });
        google.accounts.id.renderButton(signInContainer, {
          theme: 'outline',
          size: 'large',
          text: 'signin_with',
          shape: 'rectangular',
        });
      };
      start();
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();
      if (!googleCredential) {
        setStatus('Sign in with Google first.', true);
        return;
      }
      setStatus('Saving...');
      try {
        await jsonFetch('/api/messages', {
          method: 'POST',
          body: JSON.stringify({ text: textEl.value }),
        });
        textEl.value = '';
        setStatus('Saved.');
        await loadMessages();
      } catch (e) {
        setStatus(e.message, true);
      }
    });

    listEl.addEventListener('click', async event => {
      const button = event.target.closest('button.delete');
      if (!button || button.disabled) return;
      setStatus('Deleting...');
      try {
        await jsonFetch(`/api/messages/${encodeURIComponent(button.dataset.id)}`, {
          method: 'DELETE',
        });
        setStatus('Deleted.');
        await loadMessages();
      } catch (e) {
        setStatus(e.message, true);
      }
    });

    signOutButton.addEventListener('click', () => {
      google.accounts.id.disableAutoSelect();
      setSignedOut('Signed out.');
      loadMessages();
    });

    loadMessages();
    initGoogleSignIn().catch(e => setAuthStatus(e.message, true));
  </script>
</body>
</html>
