<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>South Whidbey Dashboard</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #111827;
      --border: #1e2d45;
      --text: #e2e8f0;
      --dim: #94a3b8;
      --accent: #38bdf8;
      --accent2: #34d399;
      --warn: #fbbf24;
      --danger: #f87171;
      --tide-high: #38bdf8;
      --tide-low: #a78bfa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      padding: 0.75rem;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 { font-size: 1.4rem; color: var(--accent); font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; }

    #clock {
      font-size: 2.5rem;
      font-weight: 200;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    #date-display { color: var(--dim); font-size: 0.8rem; text-align: right; margin-top: 0.1rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.75rem;
      overflow: hidden;
    }

    .card-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--dim);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stale-badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 0.25rem;
      background: rgba(251,191,36,0.15);
      color: var(--warn);
      letter-spacing: 0.05em;
    }

    .data-age {
      font-size: 0.62rem;
      padding: 0.15rem 0.45rem;
      border-radius: 0.25rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }
    .data-age.fresh { color: var(--dim); background: transparent; }
    .data-age.warn  { color: var(--warn); background: rgba(251,191,36,0.15); }
    .data-age.old   { color: var(--danger); background: rgba(248,113,113,0.15); animation: pulse 2s ease-in-out infinite; }

    /* --- WEATHER --- */
    #weather { grid-column: 1; display: flex; flex-direction: column; }

    .weather-days {
      display: flex;
      gap: 0.5rem;
      flex: 1;
      min-height: 0;
    }

    .weather-day {
      background: var(--bg);
      border-radius: 0.5rem;
      padding: 0.6rem 0.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      flex: 1;
    }

    .weather-day .day-name { font-size: 0.75rem; color: var(--dim); margin-bottom: 0.25rem; }
    .weather-day .weather-icon { font-size: 1.6rem; margin: 0.2rem 0; }
    .weather-day .temp-high { font-size: 1.2rem; font-weight: 600; }
    .weather-day .temp-low { font-size: 0.85rem; color: var(--dim); }
    .weather-day .precip { font-size: 0.7rem; color: var(--accent); margin-top: 0.2rem; }
    .weather-day .wind { font-size: 0.7rem; color: var(--dim); margin-top: 0.15rem; }

    .current-weather {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .current-weather .now-icon { font-size: 2.2rem; }
    .current-weather .now-temp { font-size: 2.2rem; font-weight: 200; }
    .current-weather .now-details { color: var(--dim); font-size: 0.8rem; line-height: 1.5; }

    /* --- TIDES --- */
    #tides { grid-column: 2; display: flex; flex-direction: column; }

    .tide-status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      padding: 0.35rem 0.6rem;
      background: var(--bg);
      border-radius: 0.5rem;
    }

    .tide-direction {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .tide-direction.rising { color: var(--tide-high); }
    .tide-direction.falling { color: var(--tide-low); }

    .tide-progress-wrap {
      flex: 1;
      margin: 0 0.75rem;
    }

    .tide-progress-label {
      font-size: 0.7rem;
      color: var(--dim);
      margin-bottom: 0.25rem;
      display: flex;
      justify-content: space-between;
    }

    .tide-progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .tide-progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .rising .tide-progress-fill { background: var(--tide-high); }
    .falling .tide-progress-fill { background: var(--tide-low); }

    /* Tide sparkline */
    .tide-graph-wrap {
      margin-bottom: 0.4rem;
    }

    #tide-sparkline {
      width: 100%;
      height: 48px;
      display: block;
    }

    .tide-list { display: grid; grid-template-rows: repeat(4, 1fr); gap: 0.3rem; flex: 1; min-height: 0; overflow: hidden; }

    .tide-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0.75rem;
      border-radius: 0.4rem;
      background: var(--bg);
      transition: opacity 0.3s;
      min-height: 0;
    }

    .tide-item.past { opacity: 0.4; }

    .tide-item .tide-time { font-size: 0.9rem; font-variant-numeric: tabular-nums; }
    .tide-item .tide-label {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .tide-item.high .tide-label { background: rgba(56,189,248,0.15); color: var(--tide-high); }
    .tide-item.low .tide-label { background: rgba(167,139,250,0.15); color: var(--tide-low); }
    .tide-item .tide-height { font-size: 1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .tide-item.high .tide-height { color: var(--tide-high); }
    .tide-item.low .tide-height { color: var(--tide-low); }
    .tide-item .tide-day { font-size: 0.7rem; color: var(--dim); margin-top: 0.15rem; }

    /* --- FERRY --- */
    #ferry { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .ferry-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      height: fit-content;
      overflow: hidden;
    }

    .ferry-panel-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }

    .ferry-route { font-size: 0.8rem; font-weight: 600; color: var(--accent2); flex: 1; }

    .countdown-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: rgba(52,211,153,0.15);
      color: var(--accent2);
      font-variant-numeric: tabular-nums;
    }

    .countdown-badge.urgent {
      background: rgba(251,191,36,0.2);
      color: var(--warn);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .last-sailing-note {
      font-size: 0.7rem;
      color: var(--warn);
    }

    .sailings-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.35rem;
      align-content: start;
      overflow: hidden;
      position: relative;
    }

    @keyframes slideInFromRight {
      from { transform: translateX(110%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes slideOutToLeft {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(-110%); opacity: 0; }
    }
    .sailing.slide-in  { animation: slideInFromRight 0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .sailing.slide-out { animation: slideOutToLeft  0.45s cubic-bezier(0.55,0,0.75,0.06) forwards; }

    .sailing {
      background: var(--bg);
      border-radius: 0.4rem;
      padding: 0.5rem 0.5rem;
      text-align: center;
      border: 1px solid transparent;
      transition: border-color 0.3s, opacity 0.3s;
    }

    .sailing.next {
      border-color: var(--accent2);
      background: rgba(52,211,153,0.06);
    }

    .sailing.past { opacity: 0.3; }

    .sailing.last-of-day { border-color: var(--warn); }

    .sailing .sail-time { font-size: 0.9rem; font-variant-numeric: tabular-nums; }
    .sailing .sail-vessel { font-size: 0.6rem; color: var(--dim); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sailing .sail-status { font-size: 0.65rem; color: var(--dim); margin-top: 0.1rem; }
    .sailing.next .sail-status { color: var(--accent2); }
    .sailing.last-of-day .sail-status { color: var(--warn); }
    .sail-fill-wrap { margin-top: 0.25rem; }
    .sail-fill-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .sail-fill-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .sail-fill-label { font-size: 0.58rem; color: var(--dim); margin-top: 0.1rem; }

    .loading { color: var(--dim); font-size: 0.9rem; padding: 1rem 0; }
    .error-msg { color: var(--danger); font-size: 0.85rem; }

    .no-ferry-key {
      color: var(--dim);
      font-size: 0.85rem;
      padding: 0.5rem 0;
    }
    .no-ferry-key a { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>🌊 South Whidbey Island</h1>
  <div>
    <div id="clock">--:--:--</div>
    <div id="date-display">Loading...</div>
  </div>
</header>

<div class="card" id="weather">
  <div class="card-title">Weather · Clinton, WA</div>
  <div class="loading">Loading weather...</div>
</div>

<div class="card" id="tides">
  <div class="card-title">Tides · Hansville Station</div>
  <div class="loading">Loading tides...</div>
</div>

<div id="ferry">
  <div class="ferry-panel" id="ferry-mukilteo"><div class="loading">Loading...</div></div>
  <div class="ferry-panel" id="ferry-clinton"><div class="loading">Loading...</div></div>
</div>

<script type="module">

// ── Clock ──────────────────────────────────────────────────────────────
const clockEl = document.getElementById('clock');
const dateEl = document.getElementById('date-display');
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  clockEl.textContent = `${h}:${m}:${s}`;
  dateEl.textContent = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── Weather codes ──────────────────────────────────────────────────────
function weatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 2) return '⛅';
  if (code === 3) return '☁️';
  if (code <= 49) return '🌫️';
  if (code <= 59) return '🌦️';
  if (code <= 69) return '🌧️';
  if (code <= 79) return '🌨️';
  if (code <= 84) return '🌧️';
  if (code <= 94) return '⛈️';
  return '🌩️';
}

function weatherDesc(code) {
  if (code === 0) return 'Clear';
  if (code <= 2) return 'Partly cloudy';
  if (code === 3) return 'Overcast';
  if (code <= 49) return 'Foggy';
  if (code <= 59) return 'Drizzle';
  if (code <= 69) return 'Rain';
  if (code <= 79) return 'Snow';
  if (code <= 84) return 'Rain showers';
  if (code <= 94) return 'Thunderstorm';
  return 'Storm';
}

function windDir(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

// ── Data freshness tracking ───────────────────────────────────────────
const dataUpdatedAt = {};  // key → timestamp ms of last successful fresh fetch

function markFresh(key) {
  dataUpdatedAt[key] = Date.now();
}

function ageLabel(key, staleData) {
  // If server flagged stale, use server's age; else use client-side timestamp
  if (staleData && staleData._stale) {
    const m = staleData._staleAgeMinutes;
    const cls = m > 30 ? 'old' : 'warn';
    return `<span class="data-age ${cls}">⚠ ${m}m old</span>`;
  }
  const t = dataUpdatedAt[key];
  if (!t) return '';
  const ageMin = Math.round((Date.now() - t) / 60000);
  if (ageMin < 2) return `<span class="data-age fresh">✓ live</span>`;
  if (ageMin < 15) return `<span class="data-age fresh">${ageMin}m ago</span>`;
  if (ageMin < 30) return `<span class="data-age warn">⚠ ${ageMin}m ago</span>`;
  return `<span class="data-age old">⚠ ${ageMin}m ago</span>`;
}

// Refresh age labels every minute so they stay current between data reloads
setInterval(() => {
  for (const [key, elId] of [
    ['weather',        'weather-age'],
    ['tides',          'tides-age'],
    ['ferry-clinton',  'ferry-clinton-age'],
    ['ferry-mukilteo', 'ferry-mukilteo-age'],
  ]) {
    const el = document.getElementById(elId);
    if (el) el.outerHTML = `<span id="${elId}">${ageLabel(key, null)}</span>`;
  }
}, 60000);

// ── Stale indicator helper (legacy, kept for compatibility) ────────────
function staleBadge(data) {
  if (data && data._stale) {
    return ` <span class="stale-badge">⚠ stale ${data._staleAgeMinutes}m</span>`;
  }
  return '';
}

// ── Weather ────────────────────────────────────────────────────────────
async function loadWeather() {
  const el = document.getElementById('weather');
  try {
    const res = await fetch('/api/weather');
    const d = await res.json();
    const cur = d.current;
    const daily = d.daily;

    const days = daily.time.slice(0, 3).map((t, i) => {
      const date = new Date(t + 'T12:00:00');
      const name = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : DAYS[date.getDay()];
      return {
        name,
        icon: weatherIcon(daily.weather_code[i]),
        hi: Math.round(daily.temperature_2m_max[i]),
        lo: Math.round(daily.temperature_2m_min[i]),
        precip: daily.precipitation_probability_max[i],
        wind: Math.round(daily.wind_speed_10m_max[i]),
        windDir: windDir(daily.wind_direction_10m_dominant[i]),
      };
    });

    if (!d._stale) markFresh('weather');
    el.innerHTML = `
      <div class="card-title">Weather · Clinton, WA <span id="weather-age">${ageLabel('weather', d)}</span></div>
      <div class="current-weather">
        <div class="now-icon">${weatherIcon(cur.weather_code)}</div>
        <div class="now-temp">${Math.round(cur.temperature_2m)}°F</div>
        <div class="now-details">
          ${weatherDesc(cur.weather_code)}<br>
          Wind: ${Math.round(cur.wind_speed_10m)} mph ${windDir(cur.wind_direction_10m)}<br>
          Humidity: ${cur.relative_humidity_2m}%
        </div>
      </div>
      <div class="weather-days">
        ${days.map(day => `
          <div class="weather-day">
            <div class="day-name">${day.name}</div>
            <div class="weather-icon">${day.icon}</div>
            <div class="temp-high">${day.hi}°</div>
            <div class="temp-low">${day.lo}°</div>
            <div class="precip">💧 ${day.precip}%</div>
            <div class="wind">💨 ${day.wind} mph ${day.windDir}</div>
          </div>`).join('')}
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="card-title">Weather</div><div class="error-msg">Failed to load weather: ${e.message}</div>`;
  }
}

// ── Tide sparkline ─────────────────────────────────────────────────────
function buildSparkline(hourlyPredictions) {
  if (!hourlyPredictions || hourlyPredictions.length < 2) return '';

  const values = hourlyPredictions.map(p => parseFloat(p.v));
  const times = hourlyPredictions.map(p => new Date(p.t));
  const minV = Math.min(...values);
  const maxV = Math.max(...values);
  const range = maxV - minV || 1;

  const W = 400, H = 60, PAD = 4;
  const n = values.length;

  const pts = values.map((v, i) => {
    const x = PAD + ((i / (n - 1)) * (W - PAD * 2));
    const y = H - PAD - ((v - minV) / range) * (H - PAD * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });

  const now = Date.now();
  const nowIdx = times.findIndex(t => t.getTime() > now);
  let nowLine = '';
  if (nowIdx > 0) {
    const nx = PAD + ((nowIdx / (n - 1)) * (W - PAD * 2));
    nowLine = `<line x1="${nx.toFixed(1)}" y1="0" x2="${nx.toFixed(1)}" y2="${H}" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="3,3"/>`;
  }

  const labels = `
    <text x="${PAD + 2}" y="${PAD + 8}" fill="rgba(148,163,184,0.6)" font-size="8">${maxV.toFixed(1)}ft</text>
    <text x="${PAD + 2}" y="${H - PAD}" fill="rgba(148,163,184,0.6)" font-size="8">${minV.toFixed(1)}ft</text>`;

  const area = `M${pts[0]} L${pts.join(' L')} L${(PAD + (W - PAD * 2)).toFixed(1)},${H} L${PAD},${H} Z`;
  const line = `M${pts[0]} L${pts.join(' L')}`;

  return `<svg id="tide-sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="tideGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#tideGrad)"/>
    <path d="${line}" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linejoin="round"/>
    ${nowLine}
    ${labels}
  </svg>`;
}

// ── Tide direction ─────────────────────────────────────────────────────
function getTideDirection(predictions) {
  const now = Date.now();
  const future = predictions.filter(p => new Date(p.t).getTime() > now);
  const past = predictions.filter(p => new Date(p.t).getTime() <= now);
  if (!future.length || !past.length) return null;
  const lastEvent = past[past.length - 1];
  const nextEvent = future[0];
  const lastTime = new Date(lastEvent.t).getTime();
  const nextTime = new Date(nextEvent.t).getTime();
  const elapsed = now - lastTime;
  const total = nextTime - lastTime;
  const progress = Math.min(1, Math.max(0, elapsed / total));
  const isRising = nextEvent.type === 'H';
  return { rising: isRising, progress, fromHeight: parseFloat(lastEvent.v), toHeight: parseFloat(nextEvent.v), nextEvent };
}

// ── Tides ──────────────────────────────────────────────────────────────
async function loadTides() {
  const el = document.getElementById('tides');
  try {
    const [hiloRes, hourlyRes] = await Promise.allSettled([
      fetch('/api/tides').then(r => r.json()),
      fetch('/api/tides/hourly').then(r => r.json()),
    ]);

    const hilo = hiloRes.status === 'fulfilled' ? hiloRes.value : null;
    const hourly = hourlyRes.status === 'fulfilled' ? hourlyRes.value : null;

    if (!hilo || !hilo.predictions) {
      el.innerHTML = `<div class="card-title">Tides</div><div class="error-msg">${hilo?.error?.message || 'No tide data'}</div>`;
      return;
    }

    const now = new Date();
    const predictions = hilo.predictions;

    const dir = getTideDirection(predictions);
    let dirHtml = '';
    if (dir) {
      const pct = (dir.progress * 100).toFixed(0);
      const dirClass = dir.rising ? 'rising' : 'falling';
      const arrow = dir.rising ? '🔺' : '🔻';
      const label = dir.rising ? 'Rising' : 'Falling';
      const nextTimeStr = new Date(dir.nextEvent.t).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      const nextLabel = dir.nextEvent.type === 'H' ? 'High' : 'Low';
      dirHtml = `
        <div class="tide-status-bar ${dirClass}">
          <div class="tide-direction ${dirClass}">${arrow} ${label}</div>
          <div class="tide-progress-wrap">
            <div class="tide-progress-label">
              <span>${dir.fromHeight.toFixed(1)}ft</span>
              <span>${nextLabel} ${nextTimeStr} · ${dir.toHeight.toFixed(1)}ft</span>
            </div>
            <div class="tide-progress-bar">
              <div class="tide-progress-fill" style="width:${pct}%"></div>
            </div>
          </div>
        </div>`;
    }

    const sparkHtml = hourly?.predictions
      ? `<div class="tide-graph-wrap">${buildSparkline(hourly.predictions)}</div>`
      : '';

    const cutoff48h = new Date(now.getTime() + 48 * 3600 * 1000);
    const upcoming = predictions
      .map(p => ({ ...p, date: new Date(p.t) }))
      .filter(p => p.date >= new Date(now.getTime() - 3600000) && p.date <= cutoff48h)
      .slice(0, 4);  // always exactly 4 rows — matches grid-template-rows

    const items = upcoming.map(p => {
      const isToday = p.date.toDateString() === now.toDateString();
      const isTomorrow = p.date.toDateString() === new Date(now.getTime() + 86400000).toDateString();
      const dayLabel = isToday ? '' : isTomorrow ? 'Tomorrow' : DAYS[p.date.getDay()];
      const timeStr = p.date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      const isPast = p.date < now;
      return `<div class="tide-item ${p.type === 'H' ? 'high' : 'low'} ${isPast ? 'past' : ''}">
        <div>
          <div class="tide-time">${timeStr}</div>
          ${dayLabel ? `<div class="tide-day">${dayLabel}</div>` : ''}
        </div>
        <span class="tide-label">${p.type === 'H' ? 'High' : 'Low'}</span>
        <div class="tide-height">${parseFloat(p.v).toFixed(1)} ft</div>
      </div>`;
    }).join('');

    if (!hilo._stale) markFresh('tides');
    el.innerHTML = `<div class="card-title">Tides · Hansville <span id="tides-age">${ageLabel('tides', hilo)}</span></div>
      ${dirHtml}
      ${sparkHtml}
      <div class="tide-list">${items}</div>`;

  } catch (e) {
    el.innerHTML = `<div class="card-title">Tides</div><div class="error-msg">Failed: ${e.message}</div>`;
  }
}

// ── Ferry helpers ──────────────────────────────────────────────────────
const countdownIntervals = {};

function formatCountdown(ms) {
  if (ms < 0) return null;
  const totalMin = Math.floor(ms / 60000);
  const hours = Math.floor(totalMin / 60);
  const mins = totalMin % 60;
  if (hours > 0) return `${hours}h ${mins}m`;
  if (totalMin < 1) return 'Departing now!';
  return `${mins} min`;
}

function parseSailings(sched) {
  let sailings = [];
  if (Array.isArray(sched)) sailings = sched;
  else if (sched.TerminalCombos?.[0]?.Times) sailings = sched.TerminalCombos[0].Times;
  else if (sched.ScheduleTimes) sailings = sched.ScheduleTimes;
  else if (sched.Times) sailings = sched.Times;
  return sailings
    .map(s => {
      const rawTime = s.DepartingTime || s.DepartureTime || s.Time || s.SailingTime || '';
      if (!rawTime) return null;
      const ms = rawTime.match(/\/Date\((\d+)/);
      const sailTime = ms ? new Date(parseInt(ms[1])) : new Date(rawTime);
      if (isNaN(sailTime)) return null;
      return { ...s, sailTime };
    })
    .filter(Boolean)
    .sort((a, b) => a.sailTime - b.sailTime);
}

function sailingCard(s, parsedSailings, spaceMap) {
  const now = new Date();
  const trueNextIdx = parsedSailings.findIndex(x => x.sailTime >= now);
  const trueLastIdx = parsedSailings.length - 1;
  const isPast = s.sailTime < now;
  const isNext = trueNextIdx >= 0 && s.sailTime.getTime() === parsedSailings[trueNextIdx].sailTime.getTime();
  const isTrueLast = s.sailTime.getTime() === parsedSailings[trueLastIdx].sailTime.getTime();
  const display = s.sailTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

  let statusText = '';
  let cssClass = 'sailing';
  if (isPast) { cssClass += ' past'; statusText = 'Departed'; }
  else if (isNext) { cssClass += ' next'; statusText = '▶ Next'; }
  else if (isTrueLast) { cssClass += ' last-of-day'; statusText = '🔔 Last'; }

  const space = spaceMap[String(s.sailTime.getTime())] || null;
  let fillHtml = '';
  if (space && space.maxSpaces > 0 && !isPast && space.driveUpSpaces !== null) {
    const filled = space.maxSpaces - space.driveUpSpaces;
    const pct = Math.min(100, (filled / space.maxSpaces) * 100).toFixed(0);
    const color = space.hexColor || '#38bdf8';
    // Only show bar if at least some cars are aboard (avoids misleading empty-bar = no data)
    const label = filled > 0
      ? `<div class="sail-fill-bar"><div class="sail-fill-fill" style="width:${pct}%;background:${color}"></div></div><div class="sail-fill-label">${space.driveUpSpaces}/${space.maxSpaces}</div>`
      : `<div class="sail-fill-label" style="color:var(--accent2)">${space.driveUpSpaces} open</div>`;
    fillHtml = `<div class="sail-fill-wrap">${label}</div>`;
  }
  const vesselHtml = space?.vesselName ? `<div class="sail-vessel">${space.vesselName}</div>` : '';
  return `<div class="${cssClass}"><div class="sail-time">${display}</div>${vesselHtml}<div class="sail-status">${statusText}</div>${fillHtml}</div>`;
}

// Tracks the current "next sailing" time per panel so we can detect transitions
const panelNextTime = {};

function buildDisplayList(parsedSailings) {
  const now = new Date();
  const lastDeparted = [...parsedSailings].reverse().find(s => s.sailTime < now);
  const next3 = parsedSailings.filter(s => s.sailTime >= now).slice(0, 3);
  const list = [];
  if (lastDeparted) list.push(lastDeparted);
  list.push(...next3);
  return list;
}

function updateFerryCards(panelId, countdownId, parsedSailings, spaceMap, animate) {
  const el = document.getElementById(panelId);
  if (!el) return;
  const grid = el.querySelector('.sailings-grid');
  if (!grid) return;

  const now = new Date();
  const trueNextIdx = parsedSailings.findIndex(s => s.sailTime >= now);
  const trueLastIdx = parsedSailings.length - 1;
  const nextIsLast = trueNextIdx === trueLastIdx && trueNextIdx >= 0;

  // Update countdown badge
  const cdEl = document.getElementById(countdownId);
  if (cdEl) {
    const next = trueNextIdx >= 0 ? parsedSailings[trueNextIdx] : null;
    if (!next) {
      cdEl.textContent = 'Done for day'; cdEl.className = 'countdown-badge';
    } else {
      const remaining = next.sailTime.getTime() - Date.now();
      const text = formatCountdown(remaining);
      const urgent = remaining < 15 * 60 * 1000;
      cdEl.textContent = `⛴ ${text}`;
      cdEl.className = `countdown-badge${urgent ? ' urgent' : ''}`;
    }
  }

  // Update last-sailing note
  const lastNote = el.querySelector('.last-sailing-note');
  if (lastNote) lastNote.style.display = nextIsLast ? '' : 'none';

  const displayList = buildDisplayList(parsedSailings);

  if (!animate) {
    // Initial render — no animation
    grid.innerHTML = displayList.map(s => sailingCard(s, parsedSailings, spaceMap)).join('');
    return;
  }

  // Animated slide: old cards slide out left, new rightmost card slides in from right
  // Only the cards that shifted need animation — slide ALL out, rebuild, slide new one in
  const oldCards = Array.from(grid.children);
  oldCards.forEach(c => {
    c.classList.add('slide-out');
  });

  setTimeout(() => {
    grid.innerHTML = displayList.map((s, i) => {
      const html = sailingCard(s, parsedSailings, spaceMap);
      // Inject slide-in class on the new rightmost card only
      if (i === displayList.length - 1) {
        return html.replace('class="sailing', 'class="sailing slide-in');
      }
      return html;
    }).join('');
  }, 420); // slightly before animation ends so it's seamless
}

function renderFerryPanel(panelId, countdownId, routeLabel, parsedSailings, spaceMap, schedData) {
  const isStale = schedData && schedData._stale;
  const el = document.getElementById(panelId);
  if (!el) return;
  if (!parsedSailings.length) { el.innerHTML = `<div class="error-msg">No sailings found.</div>`; return; }

  const now = new Date();
  const trueNextIdx = parsedSailings.findIndex(s => s.sailTime >= now);
  const trueLastIdx = parsedSailings.length - 1;
  const nextIsLast = trueNextIdx === trueLastIdx && trueNextIdx >= 0;
  const nextTime = trueNextIdx >= 0 ? parsedSailings[trueNextIdx].sailTime.getTime() : null;

  // Full rebuild of panel HTML (header + grid)
  const displayList = buildDisplayList(parsedSailings);
  const cards = displayList.map(s => sailingCard(s, parsedSailings, spaceMap)).join('');

  el.innerHTML = `
    <div class="ferry-panel-header">
      <span class="ferry-route">⛴ ${routeLabel}</span>
      <span id="${countdownId}" class="countdown-badge">⛴ ...</span>
      ${nextIsLast ? '<span class="last-sailing-note">⚠ Last</span>' : ''}
      <span id="${panelId}-age">${ageLabel(panelId, schedData)}</span>
    </div>
    <div class="sailings-grid">${cards}</div>`;

  panelNextTime[panelId] = nextTime;

  // Countdown + slide-check ticker
  if (countdownIntervals[countdownId]) clearInterval(countdownIntervals[countdownId]);
  countdownIntervals[countdownId] = setInterval(() => {
    const now2 = new Date();
    const newNextIdx = parsedSailings.findIndex(s => s.sailTime >= now2);
    const newNextTime = newNextIdx >= 0 ? parsedSailings[newNextIdx].sailTime.getTime() : null;

    // If the "next" sailing has changed, animate the slide transition
    const shouldAnimate = newNextTime !== panelNextTime[panelId];
    if (shouldAnimate) panelNextTime[panelId] = newNextTime;

    updateFerryCards(panelId, countdownId, parsedSailings, spaceMap, shouldAnimate);
  }, 30000);

  // Initial countdown update (no animation)
  updateFerryCards(panelId, countdownId, parsedSailings, spaceMap, false);
}

// ── Ferry loader ───────────────────────────────────────────────────────
async function loadFerry() {
  const [clintonSched, clintonSpace, mukilteoSched, mukilteoSpace] = await Promise.allSettled([
    fetch('/api/ferry/clinton').then(r => r.json()),
    fetch('/api/ferry/clinton/space').then(r => r.json()),
    fetch('/api/ferry/mukilteo').then(r => r.json()),
    fetch('/api/ferry/mukilteo/space').then(r => r.json()),
  ]);

  const clintonData  = clintonSched.status  === 'fulfilled' ? clintonSched.value  : null;
  const clintonSp    = (clintonSpace.status === 'fulfilled' && !clintonSpace.value?.error)  ? clintonSpace.value  : {};
  const mukilteoData = mukilteoSched.status === 'fulfilled' ? mukilteoSched.value : null;
  const mukilteoSp   = (mukilteoSpace.status === 'fulfilled' && !mukilteoSpace.value?.error) ? mukilteoSpace.value : {};

  if (clintonData?.error === 'WSF_API_KEY not configured') {
    document.getElementById('ferry').innerHTML = `<div class="no-ferry-key">Ferry schedule requires a free WSDOT API key. <a href="https://www.wsdot.wa.gov/traffic/api/" target="_blank">Register here</a>, then add to <code>.env</code> as <code>WSF_API_KEY</code>.</div>`;
    return;
  }

  if (mukilteoData) {
    if (!mukilteoData._stale) markFresh('ferry-mukilteo');
    renderFerryPanel('ferry-mukilteo', 'countdown-mukilteo', 'Mukilteo → Clinton', parseSailings(mukilteoData), mukilteoSp, mukilteoData);
  }
  if (clintonData) {
    if (!clintonData._stale) markFresh('ferry-clinton');
    renderFerryPanel('ferry-clinton',  'countdown-clinton',  'Clinton → Mukilteo',  parseSailings(clintonData),  clintonSp,  clintonData);
  }
}

// ── Init ───────────────────────────────────────────────────────────────
loadWeather();
loadTides();
loadFerry();

setInterval(loadWeather, 10 * 60 * 1000);
setInterval(loadTides,   30 * 60 * 1000);
setInterval(loadFerry,    2 * 60 * 1000);  // 2min: keeps space occupancy fresh

</script>
