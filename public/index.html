<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>South Whidbey Dashboard</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #111827;
      --border: #1e2d45;
      --text: #e2e8f0;
      --dim: #94a3b8;
      --accent: #38bdf8;
      --accent2: #34d399;
      --warn: #fbbf24;
      --danger: #f87171;
      --tide-high: #38bdf8;
      --tide-low: #a78bfa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      padding: 0.75rem;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 { font-size: 1.4rem; color: var(--accent); font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; }

    .sun-times {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.15rem;
      font-size: 0.95rem;
      color: var(--dim);
    }
    .sun-times span { display: flex; align-items: center; gap: 0.3rem; }

    #clock {
      font-size: 2.5rem;
      font-weight: 200;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    #date-display { color: var(--dim); font-size: 0.8rem; text-align: right; margin-top: 0.1rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.75rem;
      overflow: hidden;
      position: relative;
    }

    .card-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--dim);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stale-badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 0.25rem;
      background: rgba(251,191,36,0.15);
      color: var(--warn);
      letter-spacing: 0.05em;
    }

    .age-tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.4rem;
      border-radius: 0.25rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .age-tag.fresh { color: var(--dim); }
    .age-tag.warn  { color: var(--warn); background: rgba(251,191,36,0.15); }
    .age-tag.old   { color: var(--danger); background: rgba(248,113,113,0.15); animation: pulse 2s ease-in-out infinite; }

    /* --- WEATHER --- */
    #weather { grid-column: 1; display: flex; flex-direction: column; }

    .weather-days {
      display: flex;
      gap: 0.5rem;
      flex: 1;
      min-height: 0;
    }

    .weather-day {
      background: var(--bg);
      border-radius: 0.5rem;
      padding: 0.6rem 0.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      flex: 1;
    }

    .weather-day .day-name { font-size: 0.75rem; color: var(--dim); margin-bottom: 0.25rem; }
    .weather-day .weather-icon { font-size: 1.6rem; margin: 0.2rem 0; }
    .weather-day .temp-high { font-size: 1.2rem; font-weight: 600; }
    .weather-day .temp-low { font-size: 0.85rem; color: var(--dim); }
    .weather-day .precip { font-size: 0.7rem; color: var(--accent); margin-top: 0.2rem; }
    .weather-day .wind { font-size: 0.7rem; color: var(--dim); margin-top: 0.15rem; }

    .current-weather {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .current-weather .now-icon { font-size: 2.2rem; }
    .current-weather .now-temp { font-size: 2.2rem; font-weight: 200; }
    .current-weather .now-details { color: var(--dim); font-size: 0.8rem; line-height: 1.5; }

    /* --- TIDES --- */
    #tides { grid-column: 2; display: flex; flex-direction: column; }

    .tide-visual {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      height: 56px;
      align-items: stretch;
    }

    .tide-now {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 3.2rem;
      line-height: 1.2;
    }
    .tide-now-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
    }
    .tide-now-value {
      font-size: 1.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--fg);
      line-height: 1;
    }
    .tide-now-unit {
      font-size: 0.6rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .tide-thermo-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
    }

    .tide-thermo-arrow {
      font-size: 0.7rem;
      margin-bottom: 0.1rem;
      line-height: 1;
    }

    .tide-thermo-svg {
      flex: 1;
      width: 100%;
    }

    .tide-thermo-label {
      font-size: 0.6rem;
      color: var(--dim);
      margin-top: 0.1rem;
    }

    /* Tide sparkline */
    .tide-sparkline-wrap {
      flex: 1;
      min-width: 0;
    }

    #tide-sparkline {
      width: 100%;
      height: 100%;
      display: block;
    }

    .tide-list { display: grid; grid-template-rows: repeat(4, 1fr); gap: 0.3rem; flex: 1; min-height: 0; overflow: hidden; }

    .tide-item {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 0.75rem;
      border-radius: 0.4rem;
      background: var(--bg);
      transition: opacity 0.3s;
      min-height: 0;
    }

    .tide-item.past { opacity: 0.4; }

    .tide-item .tide-time { font-size: 0.9rem; font-variant-numeric: tabular-nums; }
    .tide-item .tide-label {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      justify-self: center;
      width: 3.2rem;
      text-align: center;
    }
    .tide-item.high .tide-label { background: rgba(56,189,248,0.15); color: var(--tide-high); }
    .tide-item.low .tide-label { background: rgba(167,139,250,0.15); color: var(--tide-low); }
    .tide-item .tide-height { font-size: 1rem; font-weight: 600; font-variant-numeric: tabular-nums; justify-self: end; }
    .tide-item.high .tide-height { color: var(--tide-high); }
    .tide-item.low .tide-height { color: var(--tide-low); }
    .tide-item .tide-day { font-size: 0.7rem; color: var(--dim); margin-top: 0.15rem; }

    /* --- FERRY --- */
    #ferry { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .ferry-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      height: fit-content;
      min-height: 8rem;
      overflow: hidden;
      position: relative;
    }

    .ferry-panel-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }

    .ferry-route { font-size: 0.8rem; font-weight: 600; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.12em; }
    .ferry-header-spacer { flex: 1; }

    .countdown-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: rgba(52,211,153,0.15);
      color: var(--accent2);
      font-variant-numeric: tabular-nums;
    }

    .countdown-badge.urgent {
      background: rgba(251,191,36,0.2);
      color: var(--warn);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .last-sailing-note {
      font-size: 0.7rem;
      color: var(--warn);
    }

    .sailings-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.35rem;
      align-content: start;
      overflow: hidden;
      position: relative;
    }

    @keyframes slideInFromRight {
      from { transform: translateX(110%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes slideOutToLeft {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(-110%); opacity: 0; }
    }
    .sailing.slide-in  { animation: slideInFromRight 0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .sailing.slide-out { animation: slideOutToLeft  0.45s cubic-bezier(0.55,0,0.75,0.06) forwards; }

    .sailing {
      background: var(--bg);
      border-radius: 0.4rem;
      padding: 0.5rem 0.5rem;
      text-align: center;
      border: 1px solid transparent;
      transition: border-color 0.3s, opacity 0.3s;
    }

    .sailing.next {
      border-color: var(--accent2);
      background: rgba(52,211,153,0.06);
    }

    .sailing.past { opacity: 0.3; }
    .sailing.departed-unknown { opacity: 0.7; border-color: var(--warn) !important; }
    .sailing.departed-unknown .sail-status { color: var(--warn); }

    .sailing.last-of-day { border-color: var(--warn); }

    .sailing .sail-time { font-size: 0.9rem; font-variant-numeric: tabular-nums; }
    .sailing .sail-vessel { font-size: 0.6rem; color: var(--dim); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sailing .sail-status { font-size: 0.65rem; color: var(--dim); margin-top: 0.1rem; }
    .sailing.next .sail-status { color: var(--accent2); }
    .sailing.last-of-day .sail-status { color: var(--warn); }
    .sail-fill-wrap { margin-top: 0.25rem; }
    .sail-fill-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .sail-fill-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .sail-fill-label { font-size: 0.58rem; color: var(--dim); margin-top: 0.1rem; }

    .loading { color: var(--dim); font-size: 0.9rem; padding: 1rem 0; }
    .error-msg { color: var(--danger); font-size: 0.85rem; }

    .no-ferry-key {
      color: var(--dim);
      font-size: 0.85rem;
      padding: 0.5rem 0;
    }
    .no-ferry-key a { color: var(--accent); }

    /* ── Mobile responsive ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      body {
        height: auto;
        overflow: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        padding: 0.6rem;
        gap: 0.6rem;
      }

      header {
        grid-column: 1;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.6rem;
      }

      h1 { font-size: 1.2rem; }

      .header-meta {
        display: flex;
        align-items: center;
        gap: 1.2rem;
        width: 100%;
      }

      #clock { font-size: 2rem; }

      #weather { grid-column: 1; }
      #tides   { grid-column: 1; }

      #ferry {
        grid-column: 1;
        grid-template-columns: 1fr;
      }

      .tide-visual { height: 64px; }
    }

  </style>
</head>
<body>

<header>
  <h1>🌊 South Whidbey Island <span style="font-size:0.45rem;color:var(--dim);font-weight:300;letter-spacing:0.05em;vertical-align:middle">v1.4.1</span></h1>
  <div class="header-meta">
    <div class="sun-times" id="sun-times"></div>
    <div id="moon-phase"></div>
  </div>
  <div>
    <div id="clock">--:--:--</div>
    <div id="date-display">Loading...</div>
  </div>
</header>

<div class="card" id="weather">
  <div class="card-title">Weather · Clinton, WA</div>
  <div class="loading">Loading weather...</div>
</div>

<div class="card" id="tides">
  <div class="card-title">Tides · Hansville Station</div>
  <div class="loading">Loading tides...</div>
</div>

<div id="ferry">
  <div class="ferry-panel" id="ferry-mukilteo"><div class="loading">Loading...</div></div>
  <div class="ferry-panel" id="ferry-clinton"><div class="loading">Loading...</div></div>
</div>

<script type="module">

// ── Clock ──────────────────────────────────────────────────────────────
const TZ = 'America/Los_Angeles'; // All displays use Pacific time regardless of client timezone
const clockEl = document.getElementById('clock');
const dateEl = document.getElementById('date-display');
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function updateClock() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
  clockEl.textContent = timeStr.replace(' AM', ' am').replace(' PM', ' pm');
  dateEl.textContent = now.toLocaleDateString('en-US', { timeZone: TZ, weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
}
updateClock();
setInterval(updateClock, 1000);

// ── Moon phase ─────────────────────────────────────────────────────────
// Pure math: synodic period from a known new moon reference.
// Phase 0..1: 0 = new moon, ~0.5 = full moon, ~1 = next new moon.
function getMoonPhase(date) {
  // Known new moon: Jan 6, 2000 18:14 UTC
  const knownNewMoon = new Date('2000-01-06T18:14:00Z').getTime();
  const synodicPeriod = 29.53058770576; // days
  const daysSince = (date.getTime() - knownNewMoon) / (24 * 3600 * 1000);
  const phase = ((daysSince / synodicPeriod) % 1 + 1) % 1; // 0..1
  return phase;
}

function renderMoon() {
  const el = document.getElementById('moon-phase');
  if (!el) return;

  const phase = getMoonPhase(new Date());
  const illumination = 0.5 * (1 - Math.cos(phase * 2 * Math.PI));
  const waxing = phase < 0.5;

  // SVG moon: 40x40, radius 16, centered at 20,20
  const R = 16;
  const cx = 20, cy = 20;

  // The terminator is drawn as an elliptical shape.
  // terminatorX controls the x-radius of the terminator ellipse.
  // At new/full moon it equals R (full disc lit or dark).
  // At quarter moons it equals 0 (straight line down the middle).
  const terminatorX = Math.abs(Math.cos(phase * 2 * Math.PI)) * R;

  // Thin outline for the full disc (no fill — background shows through)
  // Then draw ONLY the lit portion as a filled path

  const top = `${cx},${cy - R}`;
  const bot = `${cx},${cy + R}`;
  let litPath;

  if (illumination < 0.01) {
    // New moon: just the outline, no lit area
    el.innerHTML = `<svg width="40" height="40" viewBox="0 0 40 40">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#555555" stroke-width="1"/>
    </svg>`;
    return;
  }

  if (illumination > 0.99) {
    // Full moon: fully lit disc
    el.innerHTML = `<svg width="40" height="40" viewBox="0 0 40 40">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="#c8d6e5" stroke="#555555" stroke-width="1"/>
    </svg>`;
    return;
  }

  // Draw the lit portion using two arcs:
  // Arc 1: the outer edge of the lit side (semicircle, radius R)
  // Arc 2: the terminator (elliptical arc with varying x-radius)

  if (waxing) {
    // Right side lit
    const outerArc = `A ${R} ${R} 0 1 1 ${bot}`;
    const tSweep = phase < 0.25 ? 0 : 1;
    const termArc = `A ${terminatorX} ${R} 0 0 ${tSweep} ${top}`;
    litPath = `M ${top} ${outerArc} ${termArc} Z`;
  } else {
    // Left side lit
    const outerArc = `A ${R} ${R} 0 1 0 ${bot}`;
    const tSweep = phase > 0.75 ? 1 : 0;
    const termArc = `A ${terminatorX} ${R} 0 0 ${tSweep} ${top}`;
    litPath = `M ${top} ${outerArc} ${termArc} Z`;
  }

  el.innerHTML = `<svg width="40" height="40" viewBox="0 0 40 40">
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#555555" stroke-width="1"/>
    <path d="${litPath}" fill="#c8d6e5"/>
  </svg>`;
}

renderMoon();
// Update moon once per hour (it barely changes)
setInterval(renderMoon, 3600 * 1000);

// ── Weather codes ──────────────────────────────────────────────────────
function weatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 2) return '⛅';
  if (code === 3) return '☁️';
  if (code <= 49) return '🌫️';
  if (code <= 59) return '🌦️';
  if (code <= 69) return '🌧️';
  if (code <= 79) return '🌨️';
  if (code <= 84) return '🌧️';
  if (code <= 94) return '⛈️';
  return '🌩️';
}

function weatherDesc(code) {
  if (code === 0) return 'Clear';
  if (code <= 2) return 'Partly cloudy';
  if (code === 3) return 'Overcast';
  if (code <= 49) return 'Foggy';
  if (code <= 59) return 'Drizzle';
  if (code <= 69) return 'Rain';
  if (code <= 79) return 'Snow';
  if (code <= 84) return 'Rain showers';
  if (code <= 94) return 'Thunderstorm';
  return 'Storm';
}

function windDir(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

// ── Data freshness tracking ───────────────────────────────────────────
const dataUpdatedAt = {};  // key → timestamp ms of last successful fresh fetch

function markFresh(key) {
  dataUpdatedAt[key] = Date.now();
}

// Refresh intervals per data source (minutes)
const REFRESH_INTERVALS = {
  'weather': 60,
  'tides': 120,
  'ferry-clinton': 0.5,
  'ferry-mukilteo': 0.5,
};

function ageTag(key, staleData) {
  // Inline age indicator — only warns when data is older than its refresh interval.
  const thresholdMin = REFRESH_INTERVALS[key] || 5;
  let ageMin;
  if (staleData && staleData._stale) {
    ageMin = staleData._staleAgeMinutes;
  } else {
    const t = dataUpdatedAt[key];
    if (!t) return `<span class="age-tag fresh" id="${key}-age">✓ live</span>`;
    ageMin = Math.round((Date.now() - t) / 60000);
  }
  if (ageMin <= thresholdMin) return `<span class="age-tag fresh" id="${key}-age">✓ live</span>`;
  if (ageMin <= thresholdMin * 2.5) return `<span class="age-tag warn" id="${key}-age">⚠ ${ageMin}m old</span>`;
  return `<span class="age-tag old" id="${key}-age">⚠ ${ageMin}m old</span>`;
}

// ── Tide coverage age tag (data-driven, not fetch-age) ──────────────────────
function tideAgeTag() {
  if (!_lastHourlyPredictions || !_lastHourlyPredictions.length) {
    return `<span class="age-tag old" id="tides-age">⚠ ERROR</span>`;
  }
  const lastPt = _lastHourlyPredictions[_lastHourlyPredictions.length - 1];
  const coverageMs = new Date(lastPt.t).getTime() - Date.now();
  const coverageH = coverageMs / 3600000;
  if (coverageH < 0)  return `<span class="age-tag old"  id="tides-age">⚠ DATA EXPIRED</span>`;
  if (coverageH < 1)  return `<span class="age-tag old"  id="tides-age">⚠ &lt;1H LEFT</span>`;
  if (coverageH < 24) return `<span class="age-tag warn" id="tides-age">⚠ ${Math.floor(coverageH)}H LEFT</span>`;
  return `<span class="age-tag fresh" id="tides-age">✓ live</span>`;
}

// Refresh age tags every minute
setInterval(() => {
  for (const key of ['weather', 'ferry-clinton', 'ferry-mukilteo']) {
    const el = document.getElementById(`${key}-age`);
    if (!el) continue;
    const tmp = document.createElement('span');
    tmp.innerHTML = ageTag(key, null);
    el.replaceWith(tmp.firstChild);
  }
  // Tides uses coverage-based tag
  const tidesEl = document.getElementById('tides-age');
  if (tidesEl) {
    const tmp = document.createElement('span');
    tmp.innerHTML = tideAgeTag();
    tidesEl.replaceWith(tmp.firstChild);
  }
}, 60000);

// ── Stale indicator helper (legacy, kept for compatibility) ────────────
function staleBadge(data) {
  if (data && data._stale) {
    return ` <span class="stale-badge">⚠ stale ${data._staleAgeMinutes}m</span>`;
  }
  return '';
}

// ── Weather ────────────────────────────────────────────────────────────
async function loadWeather() {
  const el = document.getElementById('weather');
  try {
    const res = await fetch('/api/weather');
    const d = await res.json();
    const cur = d.current;
    const daily = d.daily;

    const days = daily.time.slice(0, 3).map((t, i) => {
      const date = new Date(t + 'T12:00:00');
      const name = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : DAYS[date.getDay()];
      return {
        name,
        icon: weatherIcon(daily.weather_code[i]),
        hi: Math.round(daily.temperature_2m_max[i]),
        lo: Math.round(daily.temperature_2m_min[i]),
        precip: daily.precipitation_probability_max[i],
        wind: Math.round(daily.wind_speed_10m_max[i]),
        windDir: windDir(daily.wind_direction_10m_dominant[i]),
      };
    });

    if (!d._stale) markFresh('weather');
    if (d.daily?.sunrise?.[0]) {
      window._sunriseMs = new Date(d.daily.sunrise[0]).getTime();
      window._sunsetMs  = new Date(d.daily.sunset[0]).getTime();
      const riseStr = new Date(window._sunriseMs).toLocaleTimeString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit', hour12: true });
      const setStr  = new Date(window._sunsetMs).toLocaleTimeString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit', hour12: true });
      const sunEl = document.getElementById('sun-times');
      if (sunEl) sunEl.innerHTML = `<span>☀️ ${riseStr}</span><span>🌙 ${setStr}</span>`;
    }
    el.innerHTML = `
      <div class="card-title">Weather · Clinton, WA ${ageTag('weather', d)}</div>
      <div class="current-weather">
        <div class="now-icon">${weatherIcon(cur.weather_code)}</div>
        <div class="now-temp">${Math.round(cur.temperature_2m)}°F</div>
        <div class="now-details">
          ${weatherDesc(cur.weather_code)}<br>
          Wind: ${Math.round(cur.wind_speed_10m)} mph ${windDir(cur.wind_direction_10m)}<br>
          Humidity: ${cur.relative_humidity_2m}%
        </div>
      </div>
      <div class="weather-days">
        ${days.map(day => `
          <div class="weather-day">
            <div class="day-name">${day.name}</div>
            <div class="weather-icon">${day.icon}</div>
            <div class="temp-high">${day.hi}°</div>
            <div class="temp-low">${day.lo}°</div>

            <div class="wind">💨 ${day.wind} mph ${day.windDir}</div>

  } catch (e) {

// ── Tide thermometer ─────────────────────────────────────────────────
function buildThermometer(currentFt, minFt, maxFt, rising) {
  // Must share EXACT same vertical dimensions as sparkline:
  // viewBox height = 56, plot area y=2..44 (PAD_T=2, plotH=42, PAD_B=12 for labels)
  const SVG_H = 56, PLOT_TOP = 2, PLOT_H = 42;
  const TW = 12, TUBE_X = 1, rx = 3;
  const INSET = 2; // gap between tube wall and fill
  // Arrow column sits right of tube; labels further right
  const ARROW_X = TUBE_X + TW + 6;  // center of arrow column (gap from tube)
  const LABEL_X = ARROW_X + 9;       // labels start past arrow
  const W = LABEL_X + 22;            // enough room for "12.3"

  const range = maxFt - minFt || 1;
  const pct = Math.min(1, Math.max(0, (currentFt - minFt) / range));
  // Fill lives inside the inset area
  const innerTop = PLOT_TOP + INSET;
  const innerH = PLOT_H - 2 * INSET;
  const fillY = innerTop + innerH * (1 - pct);
  const fillH = innerTop + innerH - fillY;

  // Arrow: triangle pointing up or down with BASE at the waterline
  const arrowSize = 4;
  const ax = ARROW_X; // center x
  const baseY = fillY; // base of triangle sits at waterline
  let arrowPath;
  if (rising) {
    // ▲ base at waterline, tip points up
    arrowPath = `M${ax - arrowSize},${baseY} L${ax + arrowSize},${baseY} L${ax},${baseY - arrowSize * 1.4} Z`;
  } else {
    // ▼ base at waterline, tip points down
    arrowPath = `M${ax - arrowSize},${baseY} L${ax + arrowSize},${baseY} L${ax},${baseY + arrowSize * 1.4} Z`;
  }

  return `<svg viewBox="0 0 ${W} ${SVG_H}" preserveAspectRatio="none" fill="none">
    <defs>
      <linearGradient id="thermoGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2d94c6"/>
        <stop offset="60%" stop-color="#0d5279"/>
        <stop offset="100%" stop-color="#0c1a2e"/>
      </linearGradient>
    </defs>
    <!-- tube: thin border lines (no fill, no stroke attr — max TV compat) -->
    <line x1="${TUBE_X}" y1="${PLOT_TOP}" x2="${TUBE_X}" y2="${PLOT_TOP + PLOT_H}" stroke="#4a5568" stroke-width="1"/>
    <line x1="${TUBE_X + TW}" y1="${PLOT_TOP}" x2="${TUBE_X + TW}" y2="${PLOT_TOP + PLOT_H}" stroke="#4a5568" stroke-width="1"/>
    <line x1="${TUBE_X}" y1="${PLOT_TOP}" x2="${TUBE_X + TW}" y2="${PLOT_TOP}" stroke="#4a5568" stroke-width="1"/>
    <line x1="${TUBE_X}" y1="${PLOT_TOP + PLOT_H}" x2="${TUBE_X + TW}" y2="${PLOT_TOP + PLOT_H}" stroke="#4a5568" stroke-width="1"/>
    <!-- water fill with matching gradient, flat rect inset from tube -->
    <rect x="${TUBE_X + INSET}" y="${fillY.toFixed(1)}" width="${TW - 2 * INSET}" height="${Math.max(0, fillH).toFixed(1)}" fill="url(#thermoGrad)"/>
    <!-- arrow at waterline -->
    <path d="${arrowPath}" fill="#f87171"/>
    <!-- axis labels (right of arrow column) -->
    <text x="${LABEL_X}" y="${PLOT_TOP + 6}" text-anchor="start" font-size="11" fill="#38bdf8">${maxFt.toFixed(1)}</text>
    <text x="${LABEL_X}" y="${PLOT_TOP + PLOT_H}" text-anchor="start" font-size="11" fill="#a78bfa">${minFt.toFixed(1)}</text>
  </svg>`;
}

// ── Tide sparkline with 3-hour time markers ──────────────────────
function buildSparkline(hourlyPredictions) {
  if (!hourlyPredictions || hourlyPredictions.length < 2) return '';

  const values = hourlyPredictions.map(p => parseFloat(p.v));
  const times  = hourlyPredictions.map(p => new Date(p.t));
  const minV = Math.min(...values);
  const maxV = Math.max(...values);
  const range = maxV - minV || 1;

  const W = 400, H = 56, PAD_T = 2, PAD_B = 12, PAD_X = 2;
  const plotH = H - PAD_T - PAD_B;
  const n = values.length;

  const xOf = i => PAD_X + (i / (n - 1)) * (W - PAD_X * 2);
  const yOf = v => PAD_T + plotH * (1 - (v - minV) / range);

  const pts = values.map((v, i) => `${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`);

  // "Now" marker
  const nowMs = Date.now();
  const nowIdx = times.findIndex(t => t.getTime() > nowMs);
  let nowLine = '';
  if (nowIdx > 0) {
    const nx = xOf(nowIdx);
    nowLine = `<line x1="${nx.toFixed(1)}" y1="${PAD_T}" x2="${nx.toFixed(1)}" y2="${PAD_T+plotH}" stroke="#8899aa" stroke-width="1.5" stroke-dasharray="3,2"/>`;
  }

  // Time range (shared by tick marks and daylight band)
  const startMs2 = times[0].getTime();
  const endMs2   = times[n-1].getTime();
  const totalMs  = endMs2 - startMs2;

  // Key time markers: 6am, noon, 6pm, midnight — bold lines, minimal labels
  let ticks = '';
  // Find next occurrence of 6, 12, 18, 0 hours from start
  const keyHours = [0, 6, 12, 18];
  const startDt = new Date(startMs2);
  // iterate hours across the full range
  for (let ms = startMs2; ms <= endMs2; ms += 3600 * 1000) {
    const pacStr = new Date(ms).toLocaleString('sv-SE', { timeZone: TZ });
    const h = parseInt(pacStr.slice(11, 13));
    if (!keyHours.includes(h)) continue;
    const min = parseInt(pacStr.slice(14, 16));
    if (min !== 0) continue;
    const frac = (ms - startMs2) / totalMs;
    const tx = (PAD_X + frac * (W - PAD_X * 2)).toFixed(1);
    const isMidOrNoon = h === 0 || h === 12;
    const sw = isMidOrNoon ? 1.5 : 0.75;
    const opacity = isMidOrNoon ? 0.45 : 0.25;
    const label = h === 0 ? 'mid' : h === 6 ? '6a' : h === 12 ? 'noon' : '6p';
    // Pre-blended stroke/fill colors (no opacity attrs — TV compat)
    const lineColor = isMidOrNoon ? '#5a6a7a' : '#333d48';
    const textColor = isMidOrNoon ? '#6b7a8a' : '#454f5a';
    ticks += `<line x1="${tx}" y1="${PAD_T}" x2="${tx}" y2="${PAD_T+plotH}" stroke="${lineColor}" stroke-width="${sw}" stroke-dasharray="${isMidOrNoon ? '' : '2,2'}"/>`;
    ticks += `<text x="${tx}" y="${H-1}" text-anchor="middle" font-size="7" fill="${textColor}">${label}</text>`;
  }

  const area = `M${pts[0]} L${pts.join(' L')} L${xOf(n-1).toFixed(1)},${PAD_T+plotH} L${PAD_X},${PAD_T+plotH} Z`;
  const line = `M${pts[0]} L${pts.join(' L')}`;

  return `<svg id="tide-sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="tideGrad" x1="0" y1="0" x2="0" y2="1" color-interpolation="sRGB">
        <stop offset="0%" stop-color="#2d94c6"/>
        <stop offset="60%" stop-color="#0d5279"/>
        <stop offset="100%" stop-color="#0c1a2e"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#tideGrad)"/>
    <path d="${line}" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-linejoin="round"/>
    ${ticks}
    ${nowLine}
  </svg>`;
}

// ── Tide direction + current height ────────────────────────────────
function getTideDirection(predictions) {
  const now = Date.now();
  const future = predictions.filter(p => new Date(p.t).getTime() > now);
  const past   = predictions.filter(p => new Date(p.t).getTime() <= now);
  if (!future.length || !past.length) return null;
  const lastEvent = past[past.length - 1];
  const nextEvent = future[0];
  const isRising  = nextEvent.type === 'H';
  const lastMs = new Date(lastEvent.t).getTime();
  const nextMs = new Date(nextEvent.t).getTime();
  const t = Math.min(1, Math.max(0, (now - lastMs) / (nextMs - lastMs)));
  const fromH = parseFloat(lastEvent.v);
  const toH   = parseFloat(nextEvent.v);
  const currentFt = fromH + (toH - fromH) * (1 - Math.cos(Math.PI * t)) / 2;
  return { rising: isRising, currentFt, fromHeight: fromH, toHeight: toH, nextEvent };
}
// ── Tide data cache (used by loadTides + refreshTideVisual) ─────────────────────
let _lastHourlyPredictions = null;
let _lastHiloPredictions   = null;

// ── Tides ──────────────────────────────────────────────────────────────
async function loadTides() {
  const el = document.getElementById('tides');
  try {
    const [hiloRes, hourlyRes] = await Promise.allSettled([
      fetch('/api/tides').then(r => r.json()),
      fetch('/api/tides/hourly').then(r => r.json()),
    ]);

    const hilo = hiloRes.status === 'fulfilled' ? hiloRes.value : null;
    const hourly = hourlyRes.status === 'fulfilled' ? hourlyRes.value : null;

    if (!hilo || !hilo.predictions) {
      el.innerHTML = `<div class="card-title">Tides · Hansville ${tideAgeTag()}</div><div class="error-msg">${hilo?.error?.message || 'No tide data'}</div>`;
      return;
    }

    const now = new Date();
    const predictions = hilo.predictions;

    const dir = getTideDirection(predictions);

    // Overall min/max from all predictions for thermometer scale
    const allHeights = predictions.map(p => parseFloat(p.v));
    const overallMin = Math.min(...allHeights);
    const overallMax = Math.max(...allHeights);

    let visualHtml = '';
    if (dir && hourly?.predictions) {
      const thermo = buildThermometer(dir.currentFt, overallMin, overallMax, dir.rising);
      visualHtml = `<div class="tide-visual">
        <div class="tide-now">
          <span class="tide-now-label">Now</span>
          <span class="tide-now-value">${dir.currentFt.toFixed(1)}</span>
          <span class="tide-now-unit">ft</span>
        </div>
        <div class="tide-thermo-wrap">
          ${thermo}
        </div>
        <div class="tide-sparkline-wrap">${buildSparkline(hourly.predictions)}</div>
      </div>`;
    } else if (hourly?.predictions) {
      visualHtml = `<div class="tide-visual"><div class="tide-sparkline-wrap">${buildSparkline(hourly.predictions)}</div></div>`;
    }

    const cutoff48h = new Date(now.getTime() + 48 * 3600 * 1000);
    const upcoming = predictions
      .map(p => ({ ...p, date: new Date(p.t) }))
      .filter(p => p.date >= new Date(now.getTime() - 3600000) && p.date <= cutoff48h)
      .slice(0, 4);  // always exactly 4 rows — matches grid-template-rows

    const items = upcoming.map(p => {
      const pacDate = d => new Date(d).toLocaleDateString('en-CA', { timeZone: TZ }); // YYYY-MM-DD
      const isToday    = pacDate(p.date) === pacDate(now);
      const isTomorrow = pacDate(p.date) === pacDate(now.getTime() + 86400000);
      const dayLabel = isToday ? '' : isTomorrow ? 'Tomorrow' :
        new Date(p.date).toLocaleDateString('en-US', { timeZone: TZ, weekday: 'long' });
      const timeStr = p.date.toLocaleTimeString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit', hour12: true });
      const isPast = p.date < now;
      return `<div class="tide-item ${p.type === 'H' ? 'high' : 'low'} ${isPast ? 'past' : ''}">
        <div>
          <div class="tide-time">${timeStr}</div>
          ${dayLabel ? `<div class="tide-day">${dayLabel}</div>` : ''}
        </div>
        <span class="tide-label">${p.type === 'H' ? 'High' : 'Low'}</span>
        <div class="tide-height">${parseFloat(p.v).toFixed(1)} ft</div>
      </div>`;
    }).join('');

    _lastHiloPredictions   = predictions;
    _lastHourlyPredictions = hourly?.predictions || null;
    if (!hilo._stale) markFresh('tides');
    el.innerHTML = `<div class="card-title">Tides · Hansville ${tideAgeTag()}</div>
      ${visualHtml}
      <div class="tide-list">${items}</div>`;

  } catch (e) {
    el.innerHTML = `<div class="card-title">Tides · Hansville ${tideAgeTag()}</div><div class="error-msg">Failed: ${e.message}</div>`;
    throw e;
  }
}

// ── Ferry helpers ──────────────────────────────────────────────────────
const countdownIntervals = {};

function formatCountdown(ms) {
  if (ms < 0) return null;
  const totalMin = Math.floor(ms / 60000);
  const hours = Math.floor(totalMin / 60);
  const mins = totalMin % 60;
  if (hours > 0) return `${hours}h ${mins}m`;
  if (totalMin < 1) return 'Departing now!';
  return `${mins} min`;
}

function parseSailings(sched) {
  let sailings = [];
  if (Array.isArray(sched)) sailings = sched;
  else if (sched.TerminalCombos?.[0]?.Times) sailings = sched.TerminalCombos[0].Times;
  else if (sched.ScheduleTimes) sailings = sched.ScheduleTimes;
  else if (sched.Times) sailings = sched.Times;
  return sailings
    .map(s => {
      const rawTime = s.DepartingTime || s.DepartureTime || s.Time || s.SailingTime || '';
      if (!rawTime) return null;
      const ms = rawTime.match(/\/Date\((\d+)/);
      const sailTime = ms ? new Date(parseInt(ms[1])) : new Date(rawTime);
      if (isNaN(sailTime)) return null;
      return { ...s, sailTime };
    })
    .filter(Boolean)
    .sort((a, b) => a.sailTime - b.sailTime);
}

function isDepartureConfirmed(s, parsedSailings, spaceMap) {
  // Only applies after scheduled time has passed
  const now = new Date();
  if (s.sailTime >= now) return false;

  const space = spaceMap[String(s.sailTime.getTime())] || null;
  const spaceMapHasData = Object.keys(spaceMap).length > 0;

  // Signal 1: this sailing is sold out (0 spaces left)
  if (space && space.maxSpaces > 0 && space.driveUpSpaces === 0) return true;

  // Signal 2: next sailing has reservations (someone is booking the next ferry)
  const nextSailing = parsedSailings.find(x => x.sailTime >= now);
  if (nextSailing) {
    const nextSpace = spaceMap[String(nextSailing.sailTime.getTime())] || null;
    if (nextSpace && nextSpace.maxSpaces > 0 && nextSpace.driveUpSpaces < nextSpace.maxSpaces) return true;
  }

  // Signal 3: space entry is absent but spaceMap has data for other sailings — WSF dropped it (departed)
  if (!space && spaceMapHasData) return true;

  return false;
}

function sailingCard(s, parsedSailings, spaceMap) {
  const now = new Date();
  const trueNextIdx = parsedSailings.findIndex(x => x.sailTime >= now);
  const trueLastIdx = parsedSailings.length - 1;
  const isPast = s.sailTime < now;
  const isNext = trueNextIdx >= 0 && s.sailTime.getTime() === parsedSailings[trueNextIdx].sailTime.getTime();
  const isTrueLast = s.sailTime.getTime() === parsedSailings[trueLastIdx].sailTime.getTime();
  const display = s.sailTime.toLocaleTimeString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit', hour12: true });

  const confirmed = isPast && isDepartureConfirmed(s, parsedSailings, spaceMap);

  let statusText = '';
  let cssClass = 'sailing';
  if (isPast && confirmed)       { cssClass += ' past departed-confirmed'; statusText = 'Departed'; }
  else if (isPast && !confirmed) { cssClass += ' past departed-unknown';   statusText = 'Departed?'; }
  else if (isNext)               { cssClass += ' next';                    statusText = '▶ Next'; }
  else if (isTrueLast)           { cssClass += ' last-of-day';             statusText = '🔔 Last'; }

  const space = spaceMap[String(s.sailTime.getTime())] || null;
  let fillHtml = '';
  // Show spaces for upcoming sailings and unconfirmed departures; hide once confirmed departed
  if (!confirmed && space && space.maxSpaces > 0 && space.driveUpSpaces !== null) {
    const filled = space.maxSpaces - space.driveUpSpaces;
    const pctFull = Math.min(100, (filled / space.maxSpaces) * 100);
    let barColor;
    if (pctFull >= 100) barColor = '#ef4444';
    else if (pctFull >= 75) barColor = '#f59e0b';
    else barColor = '#34d399';
    const label = filled > 0
      ? `<div class="sail-fill-bar"><div class="sail-fill-fill" style="width:${pctFull.toFixed(0)}%;background:${barColor}"></div></div><div class="sail-fill-label">${space.driveUpSpaces} open</div>`
      : `<div class="sail-fill-label" style="color:var(--accent2)">${space.driveUpSpaces} open</div>`;
    fillHtml = `<div class="sail-fill-wrap">${label}</div>`;
  }
  const vesselName = s.VesselName || space?.vesselName || '';
  const vesselHtml = vesselName ? `<div class="sail-vessel">${vesselName}</div>` : '';
  return `<div class="${cssClass}"><div class="sail-time">${display}</div>${vesselHtml}<div class="sail-status">${statusText}</div>${fillHtml}</div>`;
}

// Tracks the current "next sailing" time per panel so we can detect transitions
const panelNextTime = {};

function buildDisplayList(parsedSailings) {
  const now = new Date();
  const lastDeparted = [...parsedSailings].reverse().find(s => s.sailTime < now);
  const next3 = parsedSailings.filter(s => s.sailTime >= now).slice(0, 3);
  const list = [];
  if (lastDeparted) list.push(lastDeparted);
  list.push(...next3);
  return list;
}

function updateFerryCards(panelId, countdownId, parsedSailings, spaceMap, animate) {
  const el = document.getElementById(panelId);
  if (!el) return;
  const grid = el.querySelector('.sailings-grid');
  if (!grid) return;

  const now = new Date();
  const trueNextIdx = parsedSailings.findIndex(s => s.sailTime >= now);
  const trueLastIdx = parsedSailings.length - 1;
  const nextIsLast = trueNextIdx === trueLastIdx && trueNextIdx >= 0;

  // Update countdown badge
  const cdEl = document.getElementById(countdownId);
  if (cdEl) {
    const next = trueNextIdx >= 0 ? parsedSailings[trueNextIdx] : null;
    if (!next) {
      cdEl.textContent = 'Done for day'; cdEl.className = 'countdown-badge';
    } else {
      const remaining = next.sailTime.getTime() - Date.now();
      const text = formatCountdown(remaining);
      const urgent = remaining < 15 * 60 * 1000;
      cdEl.textContent = `⛴ ${text}`;
      cdEl.className = `countdown-badge${urgent ? ' urgent' : ''}`;
    }
  }

  // Update last-sailing note
  const lastNote = el.querySelector('.last-sailing-note');
  if (lastNote) lastNote.style.display = nextIsLast ? '' : 'none';

  const displayList = buildDisplayList(parsedSailings);

  if (!animate) {
    // Initial render — no animation
    grid.innerHTML = displayList.map(s => sailingCard(s, parsedSailings, spaceMap)).join('');
    return;
  }

  // Animated slide: old cards slide out left, new rightmost card slides in from right
  // Only the cards that shifted need animation — slide ALL out, rebuild, slide new one in
  const oldCards = Array.from(grid.children);
  oldCards.forEach(c => {
    c.classList.add('slide-out');
  });

  setTimeout(() => {
    grid.innerHTML = displayList.map((s, i) => {
      const html = sailingCard(s, parsedSailings, spaceMap);
      // Inject slide-in class on the new rightmost card only
      if (i === displayList.length - 1) {
        return html.replace('class="sailing', 'class="sailing slide-in');
      }
      return html;
    }).join('');
  }, 420); // slightly before animation ends so it's seamless
}

function renderFerryPanel(panelId, countdownId, routeLabel, parsedSailings, spaceMap, schedData) {
  const isStale = schedData && schedData._stale;
  const el = document.getElementById(panelId);
  if (!el) return;
  if (!parsedSailings.length) { el.innerHTML = `<div class="error-msg">No sailings found.</div>`; return; }

  const now = new Date();
  const trueNextIdx = parsedSailings.findIndex(s => s.sailTime >= now);
  const trueLastIdx = parsedSailings.length - 1;
  const nextIsLast = trueNextIdx === trueLastIdx && trueNextIdx >= 0;
  const nextTime = trueNextIdx >= 0 ? parsedSailings[trueNextIdx].sailTime.getTime() : null;

  // Full rebuild of panel HTML (header + grid)
  const displayList = buildDisplayList(parsedSailings);
  const cards = displayList.map(s => sailingCard(s, parsedSailings, spaceMap)).join('');

  el.innerHTML = `
    <div class="ferry-panel-header">
      <span class="ferry-route">⛴ ${routeLabel}</span>
      ${ageTag(panelId, schedData)}
      <span class="ferry-header-spacer"></span>
      <span id="${countdownId}" class="countdown-badge">⛴ ...</span>
      ${nextIsLast ? '<span class="last-sailing-note">⚠ Last</span>' : ''}
    </div>
    <div class="sailings-grid">${cards}</div>`;

  panelNextTime[panelId] = nextTime;

  // Countdown + slide-check ticker
  if (countdownIntervals[countdownId]) clearInterval(countdownIntervals[countdownId]);
  countdownIntervals[countdownId] = setInterval(() => {
    const now2 = new Date();
    const newNextIdx = parsedSailings.findIndex(s => s.sailTime >= now2);
    const newNextTime = newNextIdx >= 0 ? parsedSailings[newNextIdx].sailTime.getTime() : null;

    // If the "next" sailing has changed, animate the slide transition
    const shouldAnimate = newNextTime !== panelNextTime[panelId];
    if (shouldAnimate) panelNextTime[panelId] = newNextTime;

    updateFerryCards(panelId, countdownId, parsedSailings, spaceMap, shouldAnimate);
  }, 30000);

  // Initial countdown update (no animation)
  updateFerryCards(panelId, countdownId, parsedSailings, spaceMap, false);
}

// ── Ferry loader ───────────────────────────────────────────────────────
async function loadFerry() {
  const [clintonSched, clintonSpace, mukilteoSched, mukilteoSpace] = await Promise.allSettled([
    fetch('/api/ferry/clinton').then(r => r.json()),
    fetch('/api/ferry/clinton/space').then(r => r.json()),
    fetch('/api/ferry/mukilteo').then(r => r.json()),
    fetch('/api/ferry/mukilteo/space').then(r => r.json()),
  ]);

  const clintonData  = clintonSched.status  === 'fulfilled' ? clintonSched.value  : null;
  const clintonSp    = (clintonSpace.status === 'fulfilled' && !clintonSpace.value?.error)  ? clintonSpace.value  : {};
  const mukilteoData = mukilteoSched.status === 'fulfilled' ? mukilteoSched.value : null;
  const mukilteoSp   = (mukilteoSpace.status === 'fulfilled' && !mukilteoSpace.value?.error) ? mukilteoSpace.value : {};

  if (clintonData?.error === 'WSF_API_KEY not configured') {
    document.getElementById('ferry').innerHTML = `<div class="no-ferry-key">Ferry schedule requires a free WSDOT API key. <a href="https://www.wsdot.wa.gov/traffic/api/" target="_blank">Register here</a>, then add to <code>.env</code> as <code>WSF_API_KEY</code>.</div>`;
    return;
  }

  if (mukilteoData && !mukilteoData.error) {
    if (!mukilteoData._stale) markFresh('ferry-mukilteo');
    renderFerryPanel('ferry-mukilteo', 'countdown-mukilteo', 'Mukilteo → Clinton', parseSailings(mukilteoData), mukilteoSp, mukilteoData);
  } else if (!mukilteoData || mukilteoData.error) {
    delete dataUpdatedAt['ferry-mukilteo'];  // triggers warn on age tag
  }
  if (clintonData && !clintonData.error) {
    if (!clintonData._stale) markFresh('ferry-clinton');
    renderFerryPanel('ferry-clinton',  'countdown-clinton',  'Clinton → Mukilteo',  parseSailings(clintonData),  clintonSp,  clintonData);
  } else if (!clintonData || clintonData.error) {
    delete dataUpdatedAt['ferry-clinton'];  // triggers warn on age tag
  }
}

// ── Tide visual 1-minute refresh ───────────────────────────────────────────────────
function refreshTideVisual() {
  if (!_lastHourlyPredictions || !_lastHiloPredictions) return;
  const el = document.getElementById('tides');
  if (!el) return;
  const visualWrap = el.querySelector('.tide-visual');
  if (!visualWrap) return;
  const dir = getTideDirection(_lastHiloPredictions);
  if (!dir) return;
  const allH = _lastHiloPredictions.map(p => parseFloat(p.v));
  visualWrap.innerHTML = `
    <div class="tide-now">
      <span class="tide-now-label">Now</span>
      <span class="tide-now-value">${dir.currentFt.toFixed(1)}</span>
      <span class="tide-now-unit">ft</span>
    </div>
    <div class="tide-thermo-wrap">
      ${buildThermometer(dir.currentFt, Math.min(...allH), Math.max(...allH), dir.rising)}
    </div>
    <div class="tide-sparkline-wrap">${buildSparkline(_lastHourlyPredictions)}</div>`;
}
setInterval(refreshTideVisual, 60 * 1000);

// ── Init ───────────────────────────────────────────────────────────────
// ── Resilient loader: retries every 5 min on failure, normal interval on success ──
const RETRY_MS = 5 * 60 * 1000;  // 5 min
const loaderSuccess = {};  // tracks whether last run succeeded

function scheduleLoader(fn, normalMs) {
  let timer = null;
  async function run() {
    try {
      await fn();
      loaderSuccess[fn.name] = true;
      timer = setTimeout(run, normalMs);
    } catch (e) {
      loaderSuccess[fn.name] = false;
      timer = setTimeout(run, RETRY_MS);
    }
  }
  run();
}

scheduleLoader(loadWeather, 60 * 60 * 1000);   // 1 hour, retry 5 min
scheduleLoader(loadTides,  120 * 60 * 1000);   // 2 hours, retry 5 min
scheduleLoader(loadFerry,   30 * 1000);        // 30 sec,  retry 5 min

// ── Google Analytics (injected if GA_MEASUREMENT_ID is set on the server) ─────
(async () => {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    if (cfg.gaMeasurementId) {
      const s = document.createElement('script');
      s.async = true;
      s.src = `https://www.googletagmanager.com/gtag/js?id=${cfg.gaMeasurementId}`;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', cfg.gaMeasurementId);
    }
  } catch (e) {
    console.warn('[ga] config fetch failed:', e.message);
  }
})();

</script>
