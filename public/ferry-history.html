<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferry History</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --panel: #111827;
      --panel2: #0f172a;
      --border: #1e2d45;
      --text: #e2e8f0;
      --dim: #94a3b8;
      --accent: #38bdf8;
      --accent2: #34d399;
      --warn: #fbbf24;
      --danger: #f87171;
      --line: #334155;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 1rem;
      align-items: center;
      padding: 0.9rem 1rem;
      background: rgba(10, 14, 26, 0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-weight: 300;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button,
    input[type="date"],
    a.button {
      min-height: 2.25rem;
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      padding: 0.4rem 0.65rem;
      text-decoration: none;
    }

    button,
    a.button { cursor: pointer; }

    button:hover,
    a.button:hover { border-color: var(--accent); }

    main {
      width: min(1180px, calc(100vw - 1.5rem));
      margin: 0 auto;
      padding: 0.85rem 0 1.5rem;
      display: grid;
      gap: 0.85rem;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 0.85rem;
      border-bottom: 1px solid var(--border);
    }

    h2 {
      margin: 0;
      color: var(--dim);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .meta {
      color: var(--dim);
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.65rem;
    }

    .metric {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 0.45rem;
      padding: 0.7rem;
      min-width: 0;
    }

    .metric-label {
      color: var(--dim);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric-value {
      margin-top: 0.25rem;
      font-size: 1.45rem;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
    }

    .diagram-wrap {
      padding: 0.75rem;
      background: var(--panel2);
      min-height: 520px;
    }

    svg {
      width: 100%;
      min-height: 520px;
      display: block;
    }

    .axis { stroke: var(--line); stroke-width: 2; }
    .grid { stroke: rgba(148, 163, 184, 0.23); stroke-width: 1; }
    .tick-label,
    .terminal-label {
      fill: var(--dim);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .terminal-label {
      fill: var(--text);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .trip-line {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
    }
    .trip-line.estimate {
      stroke-dasharray: 5 5;
      opacity: 0.62;
    }
    .vessel-dot {
      stroke: var(--bg);
      stroke-width: 2;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem 0.8rem;
      padding: 0.7rem 0.85rem;
      border-top: 1px solid var(--border);
      color: var(--dim);
      font-size: 0.82rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 0;
    }

    .swatch {
      width: 0.8rem;
      height: 0.8rem;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }

    th,
    td {
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--dim);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      background: rgba(15, 23, 42, 0.72);
    }

    tr:last-child td { border-bottom: 0; }
    .vessel { font-weight: 600; }
    .empty { color: var(--dim); }
    .actual { color: var(--text); }
    .scheduled,
    .basis {
      color: var(--dim);
      font-size: 0.78rem;
      margin-top: 0.16rem;
    }
    .late { color: var(--danger); }
    .ok { color: var(--accent2); }

    .state {
      display: inline-flex;
      align-items: center;
      min-height: 1.3rem;
      padding: 0.1rem 0.4rem;
      border-radius: 0.3rem;
      background: rgba(56, 189, 248, 0.12);
      color: var(--accent);
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .state.arrived { color: var(--accent2); background: rgba(52, 211, 153, 0.12); }
    .state.scheduled-past { color: var(--warn); background: rgba(251, 191, 36, 0.12); }

    .error {
      color: var(--danger);
      padding: 0.75rem 0.85rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 760px) {
      header { grid-template-columns: 1fr; }
      .nav { justify-content: flex-start; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .diagram-wrap { min-height: 420px; padding: 0.5rem; }
      svg { min-height: 420px; }
      th,
      td { padding: 0.48rem 0.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ferry History</h1>
    <div class="nav">
      <a class="button" id="main-link" href="/">Dashboard</a>
      <button id="prev-date" type="button" title="Previous day">Prev</button>
      <input id="date-input" type="date">
      <button id="next-date" type="button" title="Next day">Next</button>
    </div>
  </header>

  <main>
    <div class="summary" id="summary"></div>

    <section>
      <div class="section-head">
        <h2>Time Distance</h2>
        <div class="meta" id="diagram-meta"></div>
      </div>
      <div class="diagram-wrap" id="diagram"></div>
      <div class="legend" id="legend"></div>
      <div class="error" id="error" hidden></div>
    </section>

    <section>
      <div class="section-head">
        <h2>Trip Table</h2>
        <div class="meta" id="table-meta"></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Vessel</th>
              <th>Clinton to Mukilteo</th>
              <th>Mukilteo to Clinton</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="trip-rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const COLORS = ['#f87171', '#34d399', '#38bdf8', '#fbbf24', '#a78bfa', '#fb923c', '#22d3ee', '#f472b6'];
    const DAY_START_HOUR = 5;
    const CLINTON = { name: 'Clinton', lat: 47.9755, lon: -122.3493 };
    const MUKILTEO = { name: 'Mukilteo', lat: 47.9485, lon: -122.3046 };

    const summaryEl = document.getElementById('summary');
    const diagramEl = document.getElementById('diagram');
    const legendEl = document.getElementById('legend');
    const rowsEl = document.getElementById('trip-rows');
    const dateInput = document.getElementById('date-input');
    const errorEl = document.getElementById('error');
    const diagramMetaEl = document.getElementById('diagram-meta');
    const tableMetaEl = document.getElementById('table-meta');

    const params = new URLSearchParams(window.location.search);
    const initialDate = validDate(params.get('date')) || todayPacific();
    dateInput.value = initialDate;

    document.getElementById('prev-date').addEventListener('click', () => shiftDate(-1));
    document.getElementById('next-date').addEventListener('click', () => shiftDate(1));
    dateInput.addEventListener('change', () => navigateTo(dateInput.value));

    loadHistory(initialDate);

    function validDate(value) {
      return /^\d{4}-\d{2}-\d{2}$/.test(value || '') ? value : '';
    }

    function todayPacific() {
      return new Date().toLocaleString('sv-SE', { timeZone: 'America/Los_Angeles' }).slice(0, 10);
    }

    function shiftDate(deltaDays) {
      const [year, month, day] = dateInput.value.split('-').map(Number);
      const next = new Date(Date.UTC(year, month - 1, day + deltaDays, 12));
      navigateTo(next.toISOString().slice(0, 10));
    }

    function navigateTo(date) {
      if (!validDate(date)) return;
      const url = new URL(window.location.href);
      url.searchParams.set('date', date);
      window.location.href = url.toString();
    }

    async function loadHistory(date) {
      renderLoading(date);
      try {
        const res = await fetch(`/api/ferry/history?date=${encodeURIComponent(date)}`);
        const data = await res.json();
        if (!res.ok && !data.generatedAt) throw new Error(data.error || `HTTP ${res.status}`);
        renderHistory(data);
      } catch (e) {
        renderError(e.message);
      }
    }

    function renderLoading(date) {
      summaryEl.innerHTML = metric('Date', escapeHtml(date)) + metric('Trips', '...') + metric('Vessels', '...') + metric('Updated', '...');
      diagramEl.innerHTML = '';
      legendEl.innerHTML = '';
      rowsEl.innerHTML = '<tr><td colspan="4" class="empty">Loading ferry history...</td></tr>';
      errorEl.hidden = true;
    }

    function renderHistory(day) {
      const trips = Array.isArray(day.trips) ? day.trips : [];
      const vessels = uniqueVessels(trips);
      const completed = trips.filter(t => t.actualDepartureMs).length;
      const generated = day.generatedAt ? formatClock(day.generatedAt) : 'none';

      summaryEl.innerHTML =
        metric('Date', escapeHtml(day.date || dateInput.value)) +
        metric('Trips logged', String(trips.length)) +
        metric('Actual departures', String(completed)) +
        metric('Updated', escapeHtml(generated));

      diagramMetaEl.textContent = trips.length ? `${trips.length} scheduled sailings` : 'No trips logged';
      tableMetaEl.textContent = vessels.length ? `${vessels.length} vessels` : '';
      errorEl.hidden = !(day.error || (day.errors && day.errors.length));
      errorEl.textContent = day.error || (day.errors || []).join('; ');

      renderDiagram(day, trips, vessels);
      renderLegend(vessels);
      renderRows(trips);
    }

    function renderError(message) {
      summaryEl.innerHTML = metric('Error', escapeHtml(message));
      diagramEl.innerHTML = '';
      legendEl.innerHTML = '';
      rowsEl.innerHTML = '<tr><td colspan="4" class="empty">No ferry history is available.</td></tr>';
      errorEl.hidden = false;
      errorEl.textContent = message;
    }

    function metric(label, value) {
      return `<div class="metric"><div class="metric-label">${label}</div><div class="metric-value">${value}</div></div>`;
    }

    function uniqueVessels(trips) {
      const names = trips.map(t => t.vesselName || 'Unknown').filter(Boolean);
      return [...new Set(names)].sort((a, b) => a.localeCompare(b));
    }

    function colorFor(vesselName, vessels) {
      const index = Math.max(0, vessels.indexOf(vesselName || 'Unknown'));
      return COLORS[index % COLORS.length];
    }

    function renderLegend(vessels) {
      legendEl.innerHTML = vessels.length
        ? vessels.map(v => `<span class="legend-item"><span class="swatch" style="background:${colorFor(v, vessels)}"></span>${escapeHtml(v)}</span>`).join('')
        : '<span class="empty">Vessel colors appear once history has vessel names.</span>';
    }

    function renderDiagram(day, trips, vessels) {
      const bounds = timeBounds(day.date, trips);
      const width = 1040;
      const height = Math.max(520, Math.round((bounds.endMs - bounds.startMs) / (60 * 60 * 1000)) * 52 + 110);
      const pad = { top: 52, right: 86, bottom: 34, left: 86 };
      const leftX = pad.left + 116;
      const rightX = width - pad.right - 116;
      const yFor = ms => pad.top + ((ms - bounds.startMs) / (bounds.endMs - bounds.startMs)) * (height - pad.top - pad.bottom);
      const xForTerminal = name => name === 'Clinton' ? leftX : rightX;
      const nowMs = Date.now();

      const ticks = [];
      for (let ms = ceilToHour(bounds.startMs); ms <= bounds.endMs; ms += 60 * 60 * 1000) {
        const y = yFor(ms);
        const hour = Number(new Intl.DateTimeFormat('en-US', {
          timeZone: 'America/Los_Angeles',
          hour: 'numeric',
          hourCycle: 'h23',
        }).format(new Date(ms)));
        const strong = hour % 6 === 0;
        ticks.push(`<line class="grid" x1="${pad.left}" x2="${width - pad.right}" y1="${y}" y2="${y}" opacity="${strong ? 1 : 0.55}"></line>`);
        if (strong || ms === ceilToHour(bounds.startMs)) {
          ticks.push(`<text class="tick-label" x="${pad.left - 14}" y="${y + 4}" text-anchor="end">${formatTimeMs(ms)}</text>`);
        }
      }

      const lines = trips.map(trip => {
        const departMs = trip.actualDepartureMs || trip.scheduledDepartureMs;
        const arriveMs = trip.arrivalMs || (departMs + 20 * 60 * 1000);
        if (!departMs || !arriveMs) return '';
        const fromX = xForTerminal(trip.fromTerminalName);
        const toX = xForTerminal(trip.toTerminalName);
        const color = colorFor(trip.vesselName || 'Unknown', vessels);
        const estimate = !trip.actualDepartureMs || trip.arrivalBasis === 'scheduled-estimate';
        return `<line class="trip-line ${estimate ? 'estimate' : ''}" x1="${fromX}" y1="${yFor(departMs)}" x2="${toX}" y2="${yFor(arriveMs)}" stroke="${color}"></line>`;
      }).join('');

      const vesselDots = currentVesselDots(day, trips, vessels, nowMs, leftX, rightX, yFor);

      diagramEl.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Ferry time-distance diagram">
          ${ticks.join('')}
          <line class="axis" x1="${leftX}" y1="${pad.top}" x2="${leftX}" y2="${height - pad.bottom}"></line>
          <line class="axis" x1="${rightX}" y1="${pad.top}" x2="${rightX}" y2="${height - pad.bottom}"></line>
          <text class="terminal-label" x="${leftX}" y="28" text-anchor="middle">Clinton</text>
          <text class="terminal-label" x="${rightX}" y="28" text-anchor="middle">Mukilteo</text>
          ${lines}
          ${vesselDots}
        </svg>`;
    }

    function currentVesselDots(day, trips, vessels, nowMs, leftX, rightX, yFor) {
      if ((day.date || '') !== todayPacific()) return '';
      const latestByVessel = new Map();
      for (const trip of trips) {
        const name = trip.vesselName || 'Unknown';
        const depart = trip.actualDepartureMs || trip.scheduledDepartureMs;
        const arrive = trip.arrivalMs || depart + 20 * 60 * 1000;
        if (depart <= nowMs && arrive >= nowMs) latestByVessel.set(name, trip);
      }
      return (day.currentVessels || []).map(vessel => {
        const name = vessel.vesselName || 'Unknown';
        const trip = latestByVessel.get(name);
        const color = colorFor(name, vessels);
        let x = null;
        let y = yFor(nowMs);
        if (vessel.atDock) {
          x = vessel.departingTerminalId === 5 || vessel.arrivingTerminalId === 5 ? leftX : rightX;
        } else if (typeof vessel.latitude === 'number' && typeof vessel.longitude === 'number') {
          const pct = terminalProgress(vessel.latitude, vessel.longitude);
          x = leftX + (rightX - leftX) * pct;
        } else if (trip) {
          const depart = trip.actualDepartureMs || trip.scheduledDepartureMs;
          const arrive = trip.arrivalMs || depart + 20 * 60 * 1000;
          const pct = clamp((nowMs - depart) / Math.max(1, arrive - depart), 0, 1);
          const fromX = trip.fromTerminalName === 'Clinton' ? leftX : rightX;
          const toX = trip.toTerminalName === 'Clinton' ? leftX : rightX;
          x = fromX + (toX - fromX) * pct;
        }
        if (x === null) return '';
        return `<circle class="vessel-dot" cx="${x}" cy="${y}" r="6" fill="${color}"><title>${escapeHtml(name)}</title></circle>`;
      }).join('');
    }

    function terminalProgress(lat, lon) {
      const ax = CLINTON.lon;
      const ay = CLINTON.lat;
      const bx = MUKILTEO.lon;
      const by = MUKILTEO.lat;
      const dx = bx - ax;
      const dy = by - ay;
      return clamp(((lon - ax) * dx + (lat - ay) * dy) / (dx * dx + dy * dy), 0, 1);
    }

    function timeBounds(date, trips) {
      const dateText = date || todayPacific();
      const start = zonedDateTimeMs(dateText, DAY_START_HOUR, 0);
      const end = zonedDateTimeMs(addDays(dateText, 1), 1, 0);
      const values = trips.flatMap(t => [t.scheduledDepartureMs, t.actualDepartureMs, t.arrivalMs]).filter(Boolean);
      if (!values.length) return { startMs: start, endMs: end };
      return {
        startMs: Math.min(start, floorToHour(Math.min(...values))),
        endMs: Math.max(end, Math.max(...values) + 30 * 60 * 1000),
      };
    }

    function renderRows(trips) {
      if (!trips.length) {
        rowsEl.innerHTML = '<tr><td colspan="4" class="empty">No trips have been recorded for this date yet.</td></tr>';
        return;
      }
      rowsEl.innerHTML = trips.map(trip => {
        const isClinton = trip.direction === 'clinton-to-mukilteo';
        const cell = tripCell(trip);
        return `<tr>
          <td class="vessel">${escapeHtml(trip.vesselName || 'Unknown')}</td>
          <td>${isClinton ? cell : '<span class="empty">-</span>'}</td>
          <td>${!isClinton ? cell : '<span class="empty">-</span>'}</td>
          <td><span class="state ${escapeHtml(trip.status || '')}">${escapeHtml(statusText(trip.status))}</span></td>
        </tr>`;
      }).join('');
    }

    function tripCell(trip) {
      const departed = trip.actualDepartureMs || trip.scheduledDepartureMs;
      const arrived = trip.arrivalMs || departed + 20 * 60 * 1000;
      const late = trip.actualDepartureMs && trip.actualDepartureMs - trip.scheduledDepartureMs > 5 * 60 * 1000;
      return `<div class="actual ${late ? 'late' : 'ok'}">${formatTimeMs(departed)} - ${formatTimeMs(arrived)}</div>
        <div class="scheduled">scheduled ${formatTimeMs(trip.scheduledDepartureMs)}</div>
        <div class="basis">${escapeHtml(arrivalBasisText(trip.arrivalBasis))}</div>`;
    }

    function statusText(status) {
      return ({
        'arrived': 'arrived',
        'in-progress': 'underway',
        'scheduled-past': 'past',
        'scheduled': 'scheduled',
      })[status] || status || 'scheduled';
    }

    function arrivalBasisText(basis) {
      return ({
        'observed-at-dock': 'arrival observed at dock',
        'wsf-eta': 'arrival from WSF ETA',
        'scheduled-estimate': 'arrival estimated',
      })[basis] || 'arrival estimated';
    }

    function formatClock(value) {
      return new Intl.DateTimeFormat([], { timeZone: 'America/Los_Angeles', hour: 'numeric', minute: '2-digit' }).format(new Date(value));
    }

    function formatTimeMs(ms) {
      if (!ms) return '--';
      return new Intl.DateTimeFormat([], { timeZone: 'America/Los_Angeles', hour: 'numeric', minute: '2-digit' }).format(new Date(ms));
    }

    function addDays(date, days) {
      const [year, month, day] = date.split('-').map(Number);
      const next = new Date(Date.UTC(year, month - 1, day + days, 12));
      return next.toISOString().slice(0, 10);
    }

    function zonedDateTimeMs(date, hour, minute) {
      const [year, month, day] = date.split('-').map(Number);
      const localAsUtc = Date.UTC(year, month - 1, day, hour, minute, 0);
      return localAsUtc - timeZoneOffsetMs(localAsUtc);
    }

    function timeZoneOffsetMs(ms) {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Los_Angeles',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hourCycle: 'h23',
      }).formatToParts(new Date(ms));
      const byType = Object.fromEntries(parts.map(part => [part.type, part.value]));
      const localAsUtc = Date.UTC(
        Number(byType.year),
        Number(byType.month) - 1,
        Number(byType.day),
        Number(byType.hour),
        Number(byType.minute),
        Number(byType.second)
      );
      return localAsUtc - ms;
    }

    function floorToHour(ms) {
      return Math.floor(ms / (60 * 60 * 1000)) * 60 * 60 * 1000;
    }

    function ceilToHour(ms) {
      return Math.ceil(ms / (60 * 60 * 1000)) * 60 * 60 * 1000;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      })[c]);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
  </script>
</body>
</html>
