<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferry History</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --panel: #111827;
      --panel2: #0f172a;
      --border: #1e2d45;
      --text: #e2e8f0;
      --dim: #94a3b8;
      --accent: #38bdf8;
      --accent2: #34d399;
      --warn: #fbbf24;
      --danger: #f87171;
      --line: #334155;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      grid-template-areas: "title nav clock";
      gap: 0.6rem;
      align-items: center;
      padding: 0.5rem 0.75rem;
      background: rgba(10, 14, 26, 0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    .title-row {
      grid-area: title;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.1rem;
      min-width: 0;
    }

    h1 {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin: 0;
      color: var(--accent);
      font-weight: 300;
      font-size: clamp(1rem, 2vw, 1.45rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .page-logo {
      width: 1.25em;
      height: 1.25em;
      flex: 0 0 auto;
      color: var(--accent);
    }

    #version {
      color: #64748b;
      font-size: 0.45em;
      letter-spacing: 0.08em;
      text-transform: none;
      vertical-align: middle;
      white-space: nowrap;
    }

    .nav {
      grid-area: nav;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: nowrap;
      justify-content: center;
      justify-self: center;
    }

    .clock-block {
      grid-area: clock;
      text-align: right;
      min-width: max-content;
      justify-self: end;
    }

    #clock {
      font-size: 2.5rem;
      font-weight: 200;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1;
    }

    #date-display {
      color: var(--dim);
      font-size: 0.8rem;
      margin-top: 0.1rem;
    }

    button,
    input[type="date"] {
      min-height: 1.9rem;
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      padding: 0.25rem 0.45rem;
    }

    .text-link {
      color: var(--dim);
      font-size: 0.82rem;
      text-decoration: none;
      white-space: nowrap;
    }

    button { cursor: pointer; }

    button:hover,
    .text-link:hover {
      color: var(--accent);
    }

    main {
      width: min(1180px, calc(100vw - 1.5rem));
      margin: 0 auto;
      padding: 0.55rem 0 1.5rem;
      display: grid;
      gap: 0.55rem;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 0.85rem;
      border-bottom: 1px solid var(--border);
    }

    h2 {
      margin: 0;
      color: var(--dim);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .meta {
      color: var(--dim);
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .summary {
      margin: 0;
      color: var(--dim);
      font-size: 0.86rem;
      font-variant-numeric: tabular-nums;
      line-height: 1.35;
    }

    .summary strong {
      color: var(--text);
      font-weight: 600;
    }

    .diagram-wrap {
      padding: 0.75rem;
      background: var(--panel2);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .axis { stroke: var(--line); stroke-width: 2; }
    .grid { stroke: rgba(148, 163, 184, 0.23); stroke-width: 1; }
    .grid.hour-grid { stroke: rgba(148, 163, 184, 0.42); stroke-width: 1.4; }
    .grid.half-hour-grid { stroke: rgba(148, 163, 184, 0.24); stroke-width: 1; }
    .tick-label,
    .terminal-label {
      fill: var(--dim);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }
    .terminal-label {
      fill: var(--text);
      font-weight: 600;
    }
    .trip-line {
      fill: none;
      opacity: 0.9;
      stroke-width: 3.5;
      stroke-linecap: round;
    }
    .trip-line.scheduled-estimate {
      stroke-dasharray: 2 8;
      stroke-width: 1.8;
      opacity: 0.44;
    }
    .trip-line.scheduled-past {
      opacity: 0.28;
    }
    .gps-track-line {
      fill: none;
      opacity: 0.92;
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .schedule-departure-tick {
      stroke: #facc15;
      stroke-linecap: round;
      stroke-width: 2.5;
    }
    .vessel-dot {
      stroke: var(--bg);
      stroke-width: 2;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem 0.8rem;
      padding: 0.7rem 0.85rem;
      border-top: 1px solid var(--border);
      color: var(--dim);
      font-size: 0.82rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 0;
    }

    .swatch {
      width: 0.8rem;
      height: 0.8rem;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .load-charts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--panel2);
    }

    .load-chart {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 0.45rem;
      background: var(--panel);
    }

    .load-chart-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
    }

    .load-chart-heading .meta {
      font-size: 0.76rem;
    }

    .load-chart-wrap {
      padding: 0.6rem 0.7rem 0.55rem;
    }

    .load-axis,
    .load-grid {
      stroke: rgba(148, 163, 184, 0.28);
      stroke-width: 1;
    }

    .load-bar {
      opacity: 0.92;
      rx: 2;
      ry: 2;
    }

    .load-label {
      fill: var(--dim);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .terminal-tables {
      display: grid;
      gap: 0.85rem;
      padding: 0.75rem;
      background: var(--panel2);
    }

    .terminal-table {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 0.45rem;
      background: var(--panel);
    }

    .terminal-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
    }

    .terminal-heading .meta {
      font-size: 0.76rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    th,
    td {
      padding: 0.55rem 0.7rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--dim);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      background: rgba(15, 23, 42, 0.72);
    }

    tr:last-child td { border-bottom: 0; }
    tbody tr.actual-sailing { background: rgba(52, 211, 153, 0.08); }
    tbody tr.actual-sailing:hover { background: rgba(52, 211, 153, 0.13); }
    .vessel { font-weight: 600; }
    .sched,
    .duration { text-align: right; }
    .empty { color: var(--dim); }
    .actual { color: var(--text); }
    .late { color: var(--danger); }
    .ok { color: var(--accent2); }

    .error {
      color: var(--danger);
      padding: 0.75rem 0.85rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 760px) {
      header {
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-areas:
          "title clock"
          "nav nav";
        padding: 0.45rem 0.6rem;
      }
      h1 { font-size: 0.95rem; }
      #version { font-size: 0.42em; }
      #clock { font-size: 2rem; }
      .nav {
        gap: 0.25rem;
        justify-content: center;
      }
      button,
      input[type="date"] {
        min-height: 1.75rem;
        padding: 0.2rem 0.35rem;
        font-size: 0.76rem;
      }
      input[type="date"] { width: 7.8rem; }
      .text-link { font-size: 0.76rem; }
      .diagram-wrap { padding: 0.5rem; }
      .load-charts {
        grid-template-columns: 1fr;
        padding: 0.5rem;
        gap: 0.6rem;
      }
      .load-chart-wrap { padding: 0.45rem 0.5rem 0.5rem; }
      th,
      td { padding: 0.42rem 0.28rem; }
      table { font-size: 0.76rem; }
      th {
        font-size: 0.58rem;
        letter-spacing: 0;
      }
      .table-wrap { overflow-x: hidden; }
      .terminal-tables { padding: 0.5rem; gap: 0.6rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-row">
      <h1>
        <svg class="page-logo" viewBox="0 0 64 64" role="img" aria-label="Washington state ferry in profile">
          <path d="M4 42h56l-5 8H12l-8-8Z" fill="currentColor" opacity="0.95"/>
          <path d="M14 25h33l8 11H10l4-11Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
          <path d="M20 18h18l5 7H16l4-7Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
          <path d="M18 32h6M29 32h6M40 32h6" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <path d="M6 54c5 3 10 3 15 0s10-3 15 0 10 3 15 0" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span id="page-title">Ferry History</span> <span id="version"></span>
      </h1>
      <a class="text-link" id="main-link" href="/">Dashboard</a>
    </div>
    <div class="nav">
      <button id="prev-date" type="button" title="Previous day">Prev</button>
      <input id="date-input" type="date">
      <button id="next-date" type="button" title="Next day">Next</button>
    </div>
    <div class="clock-block">
      <div id="clock">--:--:--</div>
      <div id="date-display">Loading...</div>
    </div>
  </header>

  <main>
    <p class="summary" id="summary"></p>

    <section>
      <div class="section-head">
        <h2>GPS Tracks</h2>
        <div class="meta" id="diagram-meta"></div>
      </div>
      <div class="diagram-wrap" id="diagram"></div>
      <div class="legend" id="legend"></div>
      <div class="error" id="error" hidden></div>
    </section>

    <section>
      <div class="section-head">
        <h2>Vehicle Loads</h2>
        <div class="meta" id="load-meta"></div>
      </div>
      <div class="load-charts" id="load-charts"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>Trip Table</h2>
        <div class="meta" id="table-meta"></div>
      </div>
      <div class="terminal-tables" id="trip-tables"></div>
    </section>
  </main>

  <script>
    const FERRY_ROUTE = window.__FERRY_ROUTE__ || {
      key: 'whidbey',
      title: 'South Whidbey Island',
      historyTitle: 'Ferry History',
      dashboardPath: '/',
      apiPrefix: '/api/ferry',
      crossingEstimateMs: 20 * 60 * 1000,
      terminals: {
        primary: { slug: 'clinton', name: 'Clinton', id: 5, lat: 47.9755, lon: -122.3493 },
        secondary: { slug: 'mukilteo', name: 'Mukilteo', id: 14, lat: 47.9485, lon: -122.3046 },
      },
    };
    const PRIMARY_TERMINAL = FERRY_ROUTE.terminals.primary;
    const SECONDARY_TERMINAL = FERRY_ROUTE.terminals.secondary;
    const TERMINALS_BY_SLUG = new Map([PRIMARY_TERMINAL, SECONDARY_TERMINAL].map(terminal => [terminal.slug, terminal]));
    const HISTORY_DISPLAY = FERRY_ROUTE.historyDisplay || {};
    const LEFT_TERMINAL = TERMINALS_BY_SLUG.get(HISTORY_DISPLAY.leftTerminalSlug) || PRIMARY_TERMINAL;
    const RIGHT_TERMINAL = TERMINALS_BY_SLUG.get(HISTORY_DISPLAY.rightTerminalSlug) || SECONDARY_TERMINAL;
    const TERMINAL_ORDER = [SECONDARY_TERMINAL.name, PRIMARY_TERMINAL.name];
    document.title = FERRY_ROUTE.historyTitle;
    document.getElementById('page-title').textContent = FERRY_ROUTE.historyTitle;
    document.getElementById('main-link').href = FERRY_ROUTE.dashboardPath;

    const COLORS = ['#f87171', '#34d399', '#38bdf8', '#fbbf24', '#a78bfa', '#fb923c', '#22d3ee', '#f472b6'];
    const HOUR_MS = 60 * 60 * 1000;
    const HALF_HOUR_MS = 30 * 60 * 1000;
    const TIMELINE_COLUMN_COUNT = 4;
    const TIMELINE_COLUMN_HOURS = 6;
    const GRID_TICK_EXTENT = 8;
    const GPS_TRACK_GAP_MS = 20 * 60 * 1000;
    const GPS_ROUTE_COVERAGE_MIN = 0.15;
    const GPS_TERMINAL_ZONE_PCT = 0.12;
    const GPS_ARRIVAL_TERMINAL_ZONE_PCT = 0.04;
    const GPS_FIRST_DEPARTURE_GRACE_MS = 15 * 60 * 1000;
    const LEGACY_OPERATIONAL_DAY_START_HOUR = 2;
    const TZ = 'America/Los_Angeles';

    const summaryEl = document.getElementById('summary');
    const diagramEl = document.getElementById('diagram');
    const legendEl = document.getElementById('legend');
    const loadChartsEl = document.getElementById('load-charts');
    const tablesEl = document.getElementById('trip-tables');
    const dateInput = document.getElementById('date-input');
    const errorEl = document.getElementById('error');
    const diagramMetaEl = document.getElementById('diagram-meta');
    const loadMetaEl = document.getElementById('load-meta');
    const tableMetaEl = document.getElementById('table-meta');
    const versionEl = document.getElementById('version');
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date-display');
    let historyRefreshMs = 60 * 1000;
    let historyRefreshTimer = null;
    let historyRequestId = 0;

    const params = new URLSearchParams(window.location.search);

    document.getElementById('prev-date').addEventListener('click', () => shiftDate(-1));
    document.getElementById('next-date').addEventListener('click', () => shiftDate(1));
    dateInput.addEventListener('change', () => navigateTo(dateInput.value));

    updateClock();
    setInterval(updateClock, 1000);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) refreshHistory();
    });

    loadConfig().then(() => {
      const initialDate = validDate(params.get('date'));
      dateInput.value = initialDate;
      loadHistory(initialDate, { showLoading: true });
      startHistoryRefresh();
    }).catch(e => {
      versionEl.textContent = '';
      renderError(e.message);
    });

    async function loadConfig() {
      try {
        const cfg = await fetch('/api/config').then(r => r.json());
        if (cfg.version) versionEl.textContent = 'v ' + cfg.version;
        if (Number.isFinite(cfg.ferryHistorySampleMs) && cfg.ferryHistorySampleMs >= 10000) {
          historyRefreshMs = cfg.ferryHistorySampleMs;
        }
      } catch (e) {
        versionEl.textContent = '';
        throw e;
      }
    }

    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
      clockEl.textContent = timeStr.replace(' AM', ' am').replace(' PM', ' pm');
      dateEl.textContent = now.toLocaleDateString('en-US', { timeZone: TZ, weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function startHistoryRefresh() {
      if (historyRefreshTimer) clearInterval(historyRefreshTimer);
      historyRefreshTimer = setInterval(refreshHistory, historyRefreshMs);
    }

    function refreshHistory() {
      if (document.hidden) return;
      loadHistory(dateInput.value, { showLoading: false });
    }

    function validDate(value) {
      return /^\d{4}-\d{2}-\d{2}$/.test(value || '') ? value : '';
    }

    function shiftDate(deltaDays) {
      if (!validDate(dateInput.value)) return;
      const [year, month, day] = dateInput.value.split('-').map(Number);
      const next = new Date(Date.UTC(year, month - 1, day + deltaDays, 12));
      navigateTo(next.toISOString().slice(0, 10));
    }

    function navigateTo(date) {
      if (!validDate(date)) return;
      const url = new URL(window.location.href);
      url.searchParams.set('date', date);
      window.location.href = url.toString();
    }

    async function loadHistory(date, options = {}) {
      const requestId = ++historyRequestId;
      if (options.showLoading) renderLoading(date);
      try {
        const url = date
          ? `${FERRY_ROUTE.apiPrefix}/history?date=${encodeURIComponent(date)}`
          : `${FERRY_ROUTE.apiPrefix}/history`;
        const departuresUrl = date
          ? `${FERRY_ROUTE.apiPrefix}/departures?date=${encodeURIComponent(date)}`
          : `${FERRY_ROUTE.apiPrefix}/departures`;
        const [res, departuresRes] = await Promise.all([
          fetch(url, { cache: 'no-store' }),
          fetch(departuresUrl, { cache: 'no-store' }),
        ]);
        const data = await res.json();
        const departureData = departuresRes.ok ? await departuresRes.json() : null;
        if (requestId !== historyRequestId) return;
        if (!res.ok && !data.generatedAt) throw new Error(data.error || `HTTP ${res.status}`);
        renderHistory(data, departureData);
      } catch (e) {
        if (requestId !== historyRequestId) return;
        renderError(e.message);
      }
    }

    function renderLoading(date) {
      summaryEl.textContent = 'Loading ferry history...';
      diagramEl.innerHTML = '';
      legendEl.innerHTML = '';
      loadChartsEl.innerHTML = '<div class="load-chart"><div class="load-chart-wrap empty">Loading ferry history...</div></div>';
      loadMetaEl.textContent = '';
      tablesEl.innerHTML = '<div class="terminal-table"><div class="table-wrap"><table><tbody><tr><td colspan="6" class="empty">Loading ferry history...</td></tr></tbody></table></div></div>';
      errorEl.hidden = true;
    }

    function renderHistory(day, departureData = null) {
      const trips = Array.isArray(day.trips) ? day.trips : [];
      if (validDate(day.date)) dateInput.value = day.date;
      const gpsTracks = collectGpsTracks(day);
      const vessels = gpsTracks.map(track => track.name);
      const leftDockMatches = trips.filter(t => t.actualDepartureMs).length;
      const gpsScheduleStats = gpsObservedScheduleStats(gpsTracks, trips);
      const generated = day.generatedAt ? formatClock(day.generatedAt) : 'none';

      const sampleCount = gpsTracks.reduce((sum, track) => sum + track.points.length, 0);
      const gpsSummary = sampleCount
        ? `${sampleCount} GPS samples`
        : 'no GPS samples';
      summaryEl.innerHTML = `<strong>${trips.length}</strong> scheduled trips · <strong>${gpsScheduleStats.matched}</strong> GPS-observed scheduled crossings · <strong>${gpsScheduleStats.missed}</strong> missed scheduled trips · <strong>${leftDockMatches}</strong> WSF LeftDock matches · updated <strong>${escapeHtml(generated)}</strong> · ${escapeHtml(gpsSummary)}`;
      diagramMetaEl.textContent = '';
      tableMetaEl.textContent = vessels.length ? `${vessels.length} vessels` : '';
      errorEl.hidden = !(day.error || (day.errors && day.errors.length));
      errorEl.textContent = day.error || (day.errors || []).join('; ');

      renderDiagram(day, trips, vessels, { gpsTracks });
      renderLegend(vessels);
      const tableTrips = tableTripRows(gpsScheduleStats, departureData?.resolvedSailings);
      renderVehicleLoadCharts(day, tableTrips, vessels);
      renderRows(tableTrips);
    }

    function renderError(message) {
      summaryEl.textContent = `Error: ${message}`;
      diagramEl.innerHTML = '';
      legendEl.innerHTML = '';
      loadChartsEl.innerHTML = '<div class="load-chart"><div class="load-chart-wrap empty">No vehicle load history is available.</div></div>';
      loadMetaEl.textContent = '';
      tablesEl.innerHTML = '<div class="terminal-table"><div class="table-wrap"><table><tbody><tr><td colspan="6" class="empty">No ferry history is available.</td></tr></tbody></table></div></div>';
      errorEl.hidden = false;
      errorEl.textContent = message;
    }

    function colorFor(vesselName, vessels) {
      const index = Math.max(0, vessels.indexOf(vesselName || 'Unknown'));
      return COLORS[index % COLORS.length];
    }

    function renderLegend(vessels) {
      legendEl.innerHTML = vessels.length
        ? vessels.map(v => `<span class="legend-item"><span class="swatch" style="background:${colorFor(v, vessels)}"></span>${escapeHtml(v)}</span>`).join('')
        : '<span class="empty">Vessel colors appear once history has vessel names.</span>';
    }

    function renderDiagram(day, trips, vessels, options = {}) {
      const bounds = timeBounds(day);
      const width = 1040;
      const durationMs = bounds.endMs - bounds.startMs;
      const hoursPerColumn = durationMs / TIMELINE_COLUMN_COUNT / HOUR_MS;
      const height = Math.max(360, Math.round(hoursPerColumn) * 52 + 86);
      const pad = { top: 48, right: 30, bottom: 18, left: 54 };
      const segments = splitTimeline(bounds, width, pad);

      const ticks = [];
      for (const segment of segments) {
        for (let ms = ceilToHalfHour(segment.startMs); ms <= segment.endMs; ms += HALF_HOUR_MS) {
          const y = yForSegment(segment, ms, height, pad);
          const isHour = isHourMark(ms);
          ticks.push(`<line class="grid ${isHour ? 'hour-grid' : 'half-hour-grid'}" x1="${segment.leftX - GRID_TICK_EXTENT}" x2="${segment.rightX + GRID_TICK_EXTENT}" y1="${y}" y2="${y}"></line>`);
        }
        for (let ms = ceilToHour(segment.startMs); ms <= segment.endMs; ms += HOUR_MS) {
          const y = yForSegment(segment, ms, height, pad);
          ticks.push(`<text class="tick-label" x="${segment.leftX - GRID_TICK_EXTENT - 4}" y="${y + 4}" text-anchor="end">${formatGraphTimeMs(ms, day.date)}</text>`);
        }
      }

      const scheduleContextLines = trips
        .filter(trip => !tripHasUsableGpsCoverage(trip))
        .flatMap(trip => segments.map(segment => scheduleContextLine(trip, segment, height, pad)))
        .join('');
      const gpsTrackLines = renderGpsTrackLines(options.gpsTracks || [], segments, vessels, height, pad);
      const departureTicks = trips.flatMap(trip => segments.map(segment => scheduledDepartureTick(trip, segment, height, pad))).join('');

      const axes = segments.map(segment => `
          <line class="axis" x1="${segment.leftX}" y1="${pad.top}" x2="${segment.leftX}" y2="${height - pad.bottom}"></line>
          <line class="axis" x1="${segment.rightX}" y1="${pad.top}" x2="${segment.rightX}" y2="${height - pad.bottom}"></line>
          ${terminalLabelSvg(LEFT_TERMINAL, segment.leftX, 18)}
          ${terminalLabelSvg(RIGHT_TERMINAL, segment.rightX, 18)}
          <text class="tick-label" x="${(segment.panelLeft + segment.panelRight) / 2}" y="40" text-anchor="middle">${formatGraphTimeMs(segment.startMs, day.date)} - ${formatGraphTimeMs(segment.endMs, day.date)}</text>
        `).join('');

      diagramEl.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" style="aspect-ratio:${width} / ${height}" role="img" aria-label="Ferry GPS tracks">
          ${ticks.join('')}
          ${axes}
          ${scheduleContextLines}
          ${gpsTrackLines}
          ${departureTicks}
        </svg>`;
    }

    function scheduleContextLine(trip, segment, height, pad) {
      const departMs = trip.scheduledDepartureMs;
      const arriveMs = trip.arrivalMs || trip.actualArrivalMs || (departMs + FERRY_ROUTE.crossingEstimateMs);
      if (!departMs || !arriveMs) return '';
      const clipStart = Math.max(departMs, segment.startMs);
      const clipEnd = Math.min(arriveMs, segment.endMs);
      if (clipEnd <= clipStart) return '';
      const duration = Math.max(1, arriveMs - departMs);
      const startPct = (clipStart - departMs) / duration;
      const endPct = (clipEnd - departMs) / duration;
      const fromX = xForTerminalInSegment(trip.fromTerminalName, segment);
      const toX = xForTerminalInSegment(trip.toTerminalName, segment);
      const x1 = interpolate(fromX, toX, startPct);
      const x2 = interpolate(fromX, toX, endPct);
      return `<line class="trip-line scheduled-estimate" x1="${x1}" y1="${yForSegment(segment, clipStart, height, pad)}" x2="${x2}" y2="${yForSegment(segment, clipEnd, height, pad)}" stroke="rgba(148, 163, 184, 0.75)"><title>${escapeHtml(trip.fromTerminalName)} to ${escapeHtml(trip.toTerminalName)} scheduled ${formatGraphTimeMs(departMs, trip.date)}</title></line>`;
    }

    function collectGpsTracks(day) {
      const byVessel = new Map();
      const rawSamples = Array.isArray(day?.vesselSamples) ? day.vesselSamples : [];
      const sourceSamples = compatibleGpsSamples(day, rawSamples);
      for (const sample of sourceSamples) {
        addGpsSample(byVessel, sample, sample.vesselName || 'Unknown', sample.vesselId || sample.vesselName || 'Unknown');
      }

      return [...byVessel.values()]
        .map(track => ({
          key: track.key,
          name: track.name,
          points: track.points.sort((a, b) => a.ms - b.ms),
        }))
        .filter(track => track.points.length > 1)
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    function compatibleGpsSamples(day, rawSamples) {
      if (!rawSamples.length) return legacyGpsSamples(day);
      const firstRawMs = Math.min(...rawSamples
        .map(sample => Date.parse(sample?.observedAt || ''))
        .filter(Number.isFinite));
      if (!Number.isFinite(firstRawMs)) return rawSamples;
      const legacyBackfill = legacyGpsSamples(day)
        .filter(sample => {
          const ms = Date.parse(sample?.observedAt || '');
          return Number.isFinite(ms) && ms < firstRawMs;
        });
      return [...legacyBackfill, ...rawSamples];
    }

    function legacyGpsSamples(day) {
      return (day?.trips || []).flatMap(trip =>
        (trip.observations || [])
          .filter(observation =>
            typeof observation?.latitude === 'number' &&
            typeof observation?.longitude === 'number'
          )
          .map(observation => ({
            ...observation,
            vesselName: observation.vesselName || trip.vesselName || 'Unknown',
            vesselId: observation.vesselId || trip.vesselId || observation.vesselName || trip.vesselName || 'Unknown',
          }))
      );
    }

    function addGpsSample(byVessel, sample, vesselName, vesselId) {
      const ms = Date.parse(sample?.observedAt || '');
      if (!Number.isFinite(ms) ||
          typeof sample?.latitude !== 'number' ||
          typeof sample?.longitude !== 'number') {
        return;
      }
      const name = vesselName || 'Unknown';
      const id = vesselId || name;
      const key = `${id}:${name}`;
      const track = byVessel.get(key) || { key, name, points: [], seen: new Set() };
      const sampleKey = [
        ms,
        sample.latitude.toFixed(5),
        sample.longitude.toFixed(5),
      ].join(':');
      if (!track.seen.has(sampleKey)) {
        track.seen.add(sampleKey);
        track.points.push({
          ms,
          pct: terminalProgress(sample.latitude, sample.longitude),
          atDock: sample.atDock ?? null,
        });
      }
      byVessel.set(key, track);
    }

    function tripHasUsableGpsCoverage(trip) {
      const points = (trip.observations || [])
        .map(observation => {
          const ms = Date.parse(observation.observedAt || '');
          if (!Number.isFinite(ms) ||
              typeof observation.latitude !== 'number' ||
              typeof observation.longitude !== 'number') {
            return null;
          }
          return {
            ms,
            pct: terminalProgress(observation.latitude, observation.longitude),
          };
        })
        .filter(Boolean);
      if (points.length < 2) return false;
      const minPct = Math.min(...points.map(point => point.pct));
      const maxPct = Math.max(...points.map(point => point.pct));
      return maxPct - minPct >= GPS_ROUTE_COVERAGE_MIN;
    }

    function gpsObservedScheduleStats(tracks, trips) {
      const scheduledTrips = trips
        .filter(trip => Number.isFinite(trip?.scheduledDepartureMs) && trip.direction)
        .sort((a, b) => a.scheduledDepartureMs - b.scheduledDepartureMs);
      const departures = gpsObservedDepartures(tracks);
      if (!scheduledTrips.length) {
        return {
          matched: 0,
          missed: 0,
          observedTrips: departures.map(departure => tableTripFromGpsDeparture(departure)),
        };
      }
      return allocateGpsDeparturesToSchedule(departures, scheduledTrips);
    }

    function gpsObservedDepartures(tracks) {
      return tracks
        .flatMap(track => gpsObservedDeparturesForTrack(track))
        .sort((a, b) => a.ms - b.ms);
    }

    function gpsObservedDeparturesForTrack(track) {
      let terminal = '';
      let pendingDeparture = null;
      const departures = [];
      for (const point of track.points) {
        const currentTerminal = gpsTerminalZone(point.pct);
        const arrivalTerminal = gpsTerminalZone(point.pct, GPS_ARRIVAL_TERMINAL_ZONE_PCT);
        if (pendingDeparture) {
          if (arrivalTerminal === pendingDeparture.toTerminal && point.atDock !== false) {
            pendingDeparture.arrivalMs = point.ms;
            departures.push(pendingDeparture);
            pendingDeparture = null;
            terminal = arrivalTerminal;
          }
          if (pendingDeparture && currentTerminal && currentTerminal !== pendingDeparture.toTerminal && point.atDock !== false) {
            pendingDeparture = null;
            terminal = currentTerminal;
          }
          continue;
        }
        const dockDeparture = terminal && currentTerminal === terminal && point.atDock === false;
        if (terminal && (!currentTerminal || dockDeparture) && !pendingDeparture) {
          pendingDeparture = {
            direction: terminal === PRIMARY_TERMINAL.name ? `${PRIMARY_TERMINAL.slug}-to-${SECONDARY_TERMINAL.slug}` : `${SECONDARY_TERMINAL.slug}-to-${PRIMARY_TERMINAL.slug}`,
            ms: point.ms,
            fromTerminal: terminal,
            toTerminal: terminal === PRIMARY_TERMINAL.name ? SECONDARY_TERMINAL.name : PRIMARY_TERMINAL.name,
            vesselName: track.name,
            vesselKey: track.key,
          };
        }
        if (!currentTerminal) continue;
        terminal = currentTerminal;
      }
      if (pendingDeparture) departures.push(pendingDeparture);
      return departures;
    }

    function allocateGpsDeparturesToSchedule(departures, scheduledTrips) {
      const tripsByDirection = scheduledTrips.reduce((byDirection, trip) => {
        const trips = byDirection.get(trip.direction) || [];
        trips.push(trip);
        byDirection.set(trip.direction, trips);
        return byDirection;
      }, new Map());
      const nextTripIndexByDirection = new Map();
      let matched = 0;
      let missed = 0;
      const observedTrips = [];
      for (const departure of departures) {
        const directionTrips = tripsByDirection.get(departure.direction) || [];
        let tripIndex = nextTripIndexByDirection.get(departure.direction) || 0;
        let trip = directionTrips[tripIndex];
        if (!trip) {
          observedTrips.push(tableTripFromGpsDeparture(departure));
          continue;
        }
        if (tripIndex === 0 && departure.ms < trip.scheduledDepartureMs - GPS_FIRST_DEPARTURE_GRACE_MS) {
          observedTrips.push(tableTripFromGpsDeparture(departure));
          continue;
        }
        while (tripIndex + 1 < directionTrips.length &&
               departure.ms >= directionTrips[tripIndex + 1].scheduledDepartureMs) {
          missed += 1;
          tripIndex += 1;
          trip = directionTrips[tripIndex];
        }
        nextTripIndexByDirection.set(departure.direction, tripIndex + 1);
        observedTrips.push(tableTripFromGpsDeparture(departure, trip));
        matched += 1;
      }
      return { matched, missed, observedTrips };
    }

    function tableTripFromGpsDeparture(departure, scheduledTrip = null) {
      const departureSpace = usableVehicleSpace(scheduledTrip?.departureSpace);
      const scheduleSpace = usableVehicleSpace(scheduledTrip?.space);
      const scheduledActualMs = actualDepartureMs(scheduledTrip);
      const departureMs = scheduledActualMs
        ? Math.min(scheduledActualMs, departure.ms)
        : departure.ms;
      return {
        direction: departure.direction,
        fromTerminalName: departure.fromTerminal,
        toTerminalName: departure.toTerminal,
        fromTerminalId: departure.fromTerminal === PRIMARY_TERMINAL.name ? PRIMARY_TERMINAL.id : SECONDARY_TERMINAL.id,
        toTerminalId: departure.toTerminal === PRIMARY_TERMINAL.name ? PRIMARY_TERMINAL.id : SECONDARY_TERMINAL.id,
        scheduledDepartureMs: scheduledTrip?.scheduledDepartureMs || null,
        actualDepartureMs: departureMs,
        arrivalMs: departure.arrivalMs || null,
        arrivalBasis: departure.arrivalMs ? 'gps-observed-terminal' : '',
        departureSpace,
        space: departureSpace || scheduleSpace || null,
        vesselName: departure.vesselName || scheduledTrip?.vesselName || 'Unknown',
        vesselKey: departure.vesselKey || '',
        gpsOnly: true,
      };
    }

    function gpsTerminalZone(pct, zonePct = GPS_TERMINAL_ZONE_PCT) {
      if (pct <= zonePct) return PRIMARY_TERMINAL.name;
      if (pct >= 1 - zonePct) return SECONDARY_TERMINAL.name;
      return '';
    }

    function renderGpsTrackLines(tracks, segments, vessels, height, pad) {
      return tracks.flatMap(track => segments.flatMap(segment =>
        gpsTrackPolylines(track, segment, colorFor(track.name, vessels), height, pad)
      )).join('');
    }

    function gpsTrackPolylines(track, segment, color, height, pad) {
      const inSegment = track.points
        .filter(point => point.ms >= segment.startMs && point.ms <= segment.endMs)
        .map(point => ({
          ms: point.ms,
          x: segment.leftX + (segment.rightX - segment.leftX) * displayProgressPct(point.pct),
        }));
      if (inSegment.length < 2) return [];
      const parts = [];
      let current = [];
      for (const point of inSegment) {
        const prev = current[current.length - 1];
        if (prev && point.ms - prev.ms > GPS_TRACK_GAP_MS) {
          if (current.length > 1) parts.push(current);
          current = [];
        }
        current.push(point);
      }
      if (current.length > 1) parts.push(current);
      return parts.map(points => {
        const pointText = points.map(point => `${point.x},${yForSegment(segment, point.ms, height, pad)}`).join(' ');
        return `<polyline class="gps-track-line" points="${pointText}" stroke="${color}"><title>${escapeHtml(track.name)} GPS track</title></polyline>`;
      });
    }

    function scheduledDepartureTick(trip, segment, height, pad) {
      const ms = trip.scheduledDepartureMs;
      if (!ms || ms < segment.startMs || ms > segment.endMs) return '';
      const y = yForSegment(segment, ms, height, pad);
      const isLeftDeparture = trip.fromTerminalName === LEFT_TERMINAL.name;
      const axisX = xForTerminalInSegment(trip.fromTerminalName, segment);
      const direction = isLeftDeparture ? -1 : 1;
      const x1 = axisX + direction * 5;
      const x2 = axisX + direction * 17;
      return `<line class="schedule-departure-tick" x1="${x1}" x2="${x2}" y1="${y}" y2="${y}"><title>${escapeHtml(trip.fromTerminalName)} scheduled departure ${formatGraphTimeMs(ms, trip.date)}</title></line>`;
    }

    function splitTimeline(bounds, width, pad) {
      const gap = 30;
      const panelWidth = (width - pad.left - pad.right - gap * (TIMELINE_COLUMN_COUNT - 1)) / TIMELINE_COLUMN_COUNT;
      return Array.from({ length: TIMELINE_COLUMN_COUNT }, (_, index) => {
        const panelLeft = pad.left + index * (panelWidth + gap);
        const panelRight = panelLeft + panelWidth;
        const terminalInset = Math.min(32, panelWidth * 0.15);
        const startMs = bounds.startMs + index * TIMELINE_COLUMN_HOURS * HOUR_MS;
        return {
          startMs,
          endMs: index === TIMELINE_COLUMN_COUNT - 1 ? bounds.endMs : startMs + TIMELINE_COLUMN_HOURS * HOUR_MS,
          panelLeft,
          panelRight,
          leftX: panelLeft + terminalInset,
          rightX: panelRight - terminalInset,
        };
      });
    }

    function yForSegment(segment, ms, height, pad) {
      return pad.top + ((ms - segment.startMs) / (segment.endMs - segment.startMs)) * (height - pad.top - pad.bottom);
    }

    function xForTerminalInSegment(name, segment) {
      return name === LEFT_TERMINAL.name ? segment.leftX : segment.rightX;
    }

    function displayProgressPct(pct) {
      return LEFT_TERMINAL.name === PRIMARY_TERMINAL.name ? pct : 1 - pct;
    }

    function terminalLabelSvg(terminal, x, y) {
      const configuredLines = HISTORY_DISPLAY.terminalLabelLines?.[terminal.slug];
      const lines = Array.isArray(configuredLines) && configuredLines.length
        ? configuredLines
        : [terminal.name];
      const tspans = lines.map((line, index) =>
        `<tspan x="${x}" dy="${index === 0 ? 0 : 15}">${escapeHtml(line)}</tspan>`
      ).join('');
      return `<text class="terminal-label" x="${x}" y="${y}" text-anchor="middle">${tspans}</text>`;
    }

    function terminalProgress(lat, lon) {
      const ax = PRIMARY_TERMINAL.lon;
      const ay = PRIMARY_TERMINAL.lat;
      const bx = SECONDARY_TERMINAL.lon;
      const by = SECONDARY_TERMINAL.lat;
      const dx = bx - ax;
      const dy = by - ay;
      return clamp(((lon - ax) * dx + (lat - ay) * dy) / (dx * dx + dy * dy), 0, 1);
    }

    function timeBounds(day) {
      const startMs = Number(day?.operationalDay?.startMs);
      const endMs = Number(day?.operationalDay?.endMs);
      if (Number.isFinite(startMs) && Number.isFinite(endMs) && endMs > startMs) {
        return { startMs, endMs };
      }
      return legacyOperationalDayBounds(day);
    }

    function legacyOperationalDayBounds(day) {
      const dateText = validDate(day?.date) || localDateText(Date.now());
      const start = zonedDateTimeMs(dateText, LEGACY_OPERATIONAL_DAY_START_HOUR, 0);
      return { startMs: start, endMs: start + 24 * HOUR_MS };
    }

    function renderRows(tableTrips) {
      if (!tableTrips.length) {
        tablesEl.innerHTML = '<div class="terminal-table"><div class="table-wrap"><table><tbody><tr><td colspan="6" class="empty">No GPS-observed departures have been recorded for this date yet.</td></tr></tbody></table></div></div>';
        return;
      }
      tablesEl.innerHTML = TERMINAL_ORDER.map(terminal => terminalTable(terminal, tableTrips, tableTrips)).join('');
    }

    function tableTripRows(gpsScheduleStats = {}, resolvedSailings = {}) {
      return [...(gpsScheduleStats.observedTrips || [])]
        .map(trip => applyResolvedDepartureTruth(trip, resolvedSailings))
        .sort((a, b) => tableSortMs(a) - tableSortMs(b));
    }

    function applyResolvedDepartureTruth(trip, resolvedSailings = {}) {
      if (!Number.isFinite(trip?.fromTerminalId) || !Number.isFinite(trip?.scheduledDepartureMs)) return trip;
      const resolved = resolvedSailings[`${trip.fromTerminalId}:${trip.scheduledDepartureMs}`];
      if (!resolved?.isDeparted || !Number.isFinite(resolved.effectiveDepartureMs)) return trip;
      return {
        ...trip,
        actualDepartureMs: resolved.effectiveDepartureMs,
        vesselName: resolved.vesselName || trip.vesselName,
        vesselId: resolved.vesselId || trip.vesselId || null,
        departureSource: resolved.timingSource || 'resolved-sailing',
      };
    }

    function renderVehicleLoadCharts(day, trips, vessels) {
      const bounds = timeBounds(day);
      const chartTrips = trips.filter(trip => actualDepartureMs(trip) && carLoad(trip));
      loadMetaEl.textContent = chartTrips.length ? `${chartTrips.length} recorded loads` : 'no vehicle load snapshots';
      loadChartsEl.innerHTML = TERMINAL_ORDER.map(terminal =>
        vehicleLoadChart(terminal, chartTrips, vessels, bounds, day.date)
      ).join('');
    }

    function vehicleLoadChart(terminal, trips, vessels, bounds, dayDate) {
      const rows = trips
        .filter(trip => trip.fromTerminalName === terminal)
        .sort((a, b) => actualDepartureMs(a) - actualDepartureMs(b));
      const maxCapacity = Math.max(1, ...trips.map(trip => carLoad(trip)?.max || 0));
      const rowHtml = rows.length
        ? vehicleLoadSvg(terminal, rows, vessels, bounds, maxCapacity, dayDate)
        : '<div class="load-chart-wrap empty">No recorded vehicle loads.</div>';
      return `<div class="load-chart" data-terminal="${escapeHtml(terminal)}">
        <div class="load-chart-heading">
          <span>${escapeHtml(terminal)}</span>
          <span class="meta">${rows.length} departures</span>
        </div>
        ${rowHtml}
      </div>`;
    }

    function vehicleLoadSvg(terminal, trips, vessels, bounds, maxCapacity, dayDate) {
      const width = 500;
      const height = 190;
      const pad = { top: 16, right: 16, bottom: 30, left: 38 };
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;
      const barWidth = Math.max(5, Math.min(16, chartW / 72));
      const grid = [0.5, 1].map(pct => {
        const y = pad.top + chartH * (1 - pct);
        const label = Math.round(maxCapacity * pct);
        return `<line class="load-grid" x1="${pad.left}" x2="${width - pad.right}" y1="${y}" y2="${y}"></line>
          <text class="load-label" x="${pad.left - 6}" y="${y + 4}" text-anchor="end">${label}</text>`;
      }).join('');
      const bars = trips.map(trip => {
        const load = carLoad(trip);
        const x = pad.left + ((actualDepartureMs(trip) - bounds.startMs) / (bounds.endMs - bounds.startMs)) * chartW;
        const barH = chartH * (load.carried / maxCapacity);
        const y = pad.top + chartH - barH;
        const color = colorFor(trip.vesselName, vessels);
        return `<rect class="load-bar" x="${x - barWidth / 2}" y="${y}" width="${barWidth}" height="${Math.max(1, barH)}" fill="${color}">
          <title>${escapeHtml(trip.vesselName || 'Unknown')} ${escapeHtml(terminal)} ${formatTableTimeMs(actualDepartureMs(trip))}: ${load.carried} of ${load.max} vehicles</title>
        </rect>`;
      }).join('');
      const startLabel = formatGraphTimeMs(bounds.startMs, '');
      const endLabel = formatGraphTimeMs(bounds.endMs, dayDate);
      return `<div class="load-chart-wrap">
        <svg viewBox="0 0 ${width} ${height}" style="aspect-ratio:${width} / ${height}" role="img" aria-label="${escapeHtml(terminal)} vehicle loads by observed departure">
          ${grid}
          <line class="load-axis" x1="${pad.left}" x2="${width - pad.right}" y1="${height - pad.bottom}" y2="${height - pad.bottom}"></line>
          <line class="load-axis" x1="${pad.left}" x2="${pad.left}" y1="${pad.top}" y2="${height - pad.bottom}"></line>
          ${bars}
          <text class="load-label" x="${pad.left}" y="${height - 8}" text-anchor="start">${startLabel}</text>
          <text class="load-label" x="${width - pad.right}" y="${height - 8}" text-anchor="end">${endLabel}</text>
        </svg>
      </div>`;
    }

    function terminalTable(terminal, trips, allTrips) {
      const rows = trips.filter(trip => trip.fromTerminalName === terminal);
      const rowHtml = rows.length
        ? rows.map(trip => tableRow(trip, allTrips)).join('')
        : '<tr><td colspan="6" class="empty">No GPS-observed departures.</td></tr>';
      return `<div class="terminal-table" data-terminal="${escapeHtml(terminal)}">
        <div class="terminal-heading">
          <span>${escapeHtml(terminal)}</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Vessel</th>
                <th>Sched</th>
                <th>Actual</th>
                <th>Travel</th>
                <th>Docked</th>
                <th>Cars</th>
              </tr>
            </thead>
            <tbody>${rowHtml}</tbody>
          </table>
        </div>
      </div>`;
    }

    function tableRow(trip, allTrips) {
      const rowClass = 'actual-sailing';
      const dockMs = dockDurationMs(trip, allTrips);
      return `<tr class="${rowClass}">
        <td class="vessel">${escapeHtml(trip.vesselName || 'Unknown')}</td>
        <td class="sched" title="${formatTimeMs(trip.scheduledDepartureMs)}">${formatTableTimeMs(trip.scheduledDepartureMs)}</td>
        <td>${tripCell(trip)}</td>
        <td class="duration" title="${escapeHtml(travelBasisText(trip))}">${formatMinutes(tripDurationMs(trip))}</td>
        <td class="duration">${formatMinutes(dockMs)}</td>
        <td class="duration" title="${escapeHtml(carLoadTitle(trip))}">${formatCarLoad(trip)}</td>
      </tr>`;
    }

    function tripCell(trip) {
      const departed = actualDepartureMs(trip);
      if (!departed) return '<span class="empty">--</span>';
      const late = departed - trip.scheduledDepartureMs > 5 * 60 * 1000;
      return `<span class="actual ${late ? 'late' : 'ok'}" title="Departed ${formatTimeMs(departed)}">${formatTableTimeMs(departed)}</span>`;
    }

    function tableSortMs(trip) {
      return trip.actualDepartureMs || trip.scheduledDepartureMs || 0;
    }

    function actualDepartureMs(trip) {
      return Number.isFinite(trip?.actualDepartureMs) ? trip.actualDepartureMs : null;
    }

    function actualArrivalMs(trip) {
      return ['observed-at-dock', 'gps-observed-terminal'].includes(trip?.arrivalBasis) && Number.isFinite(trip?.arrivalMs)
        ? trip.arrivalMs
        : null;
    }

    function tripDurationMs(trip) {
      const departed = actualDepartureMs(trip);
      const arrived = actualArrivalMs(trip);
      return departed && arrived && arrived > departed ? arrived - departed : null;
    }

    function dockDurationMs(trip, trips) {
      const arrived = actualArrivalMs(trip);
      if (!arrived || !trip.vesselName || !trip.toTerminalId) return null;
      const next = trips
        .filter(candidate =>
          candidate !== trip &&
          candidate.vesselName === trip.vesselName &&
          candidate.fromTerminalId === trip.toTerminalId &&
          actualDepartureMs(candidate) > arrived)
        .sort((a, b) => actualDepartureMs(a) - actualDepartureMs(b))[0];
      if (!next) return null;
      return actualDepartureMs(next) - arrived;
    }

    function arrivalBasisText(basis) {
      return ({
        'observed-at-dock': 'arrival observed at dock',
        'gps-observed-terminal': 'arrival observed by GPS',
        'wsf-eta': 'arrival from WSF ETA',
        'scheduled-estimate': 'arrival estimated',
      })[basis] || 'arrival estimated';
    }

    function travelBasisText(trip) {
      if (!actualDepartureMs(trip)) return 'no confirmed departure';
      if (!actualArrivalMs(trip)) return 'no observed dock arrival';
      return `actual departure, ${arrivalBasisText(trip.arrivalBasis)}`;
    }

    function formatClock(value) {
      return new Intl.DateTimeFormat([], { timeZone: TZ, hour: 'numeric', minute: '2-digit' }).format(new Date(value));
    }

    function formatTimeMs(ms) {
      if (!ms) return '--';
      return new Intl.DateTimeFormat([], { timeZone: TZ, hour: 'numeric', minute: '2-digit' }).format(new Date(ms));
    }

    function formatTableTimeMs(ms) {
      if (!ms) return '--';
      return new Intl.DateTimeFormat([], { timeZone: TZ, hour: 'numeric', minute: '2-digit', hour12: false }).format(new Date(ms));
    }

    function formatGraphTimeMs(ms, dayDate) {
      if (!ms) return '--';
      const dateText = localDateText(ms);
      const timeText = formatTableTimeMs(ms);
      return dateText && dayDate && dateText > dayDate ? `${timeText}+1` : timeText;
    }

    function formatMinutes(ms) {
      return ms == null ? '--' : (ms / 60000).toFixed(1);
    }

    function carLoad(trip) {
      const space = usableVehicleSpace(trip?.departureSpace) || usableVehicleSpace(trip?.space) || {};
      const max = Number(space.maxSpaces);
      const open = Number(space.driveUpSpaces);
      if (!Number.isFinite(max) || max <= 0 || !Number.isFinite(open)) return null;
      return {
        carried: Math.max(0, Math.min(max, max - open)),
        max,
      };
    }

    function formatCarLoad(trip) {
      const load = carLoad(trip);
      return load ? `${load.carried} / ${load.max}` : '--';
    }

    function carLoadTitle(trip) {
      const load = carLoad(trip);
      return load ? `${load.carried} of ${load.max} vehicle spaces filled at observed departure` : 'vehicle space count unavailable';
    }

    function usableVehicleSpace(space) {
      return space && (
        Number.isFinite(space.driveUpSpaces) ||
        Number.isFinite(space.maxSpaces) ||
        space.hexColor
      ) ? space : null;
    }

    function addDays(date, days) {
      const [year, month, day] = date.split('-').map(Number);
      const next = new Date(Date.UTC(year, month - 1, day + days, 12));
      return next.toISOString().slice(0, 10);
    }

    function zonedDateTimeMs(date, hour, minute) {
      const [year, month, day] = date.split('-').map(Number);
      const localAsUtc = Date.UTC(year, month - 1, day, hour, minute, 0);
      return localAsUtc - timeZoneOffsetMs(localAsUtc);
    }

    function timeZoneOffsetMs(ms) {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: TZ,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hourCycle: 'h23',
      }).formatToParts(new Date(ms));
      const byType = Object.fromEntries(parts.map(part => [part.type, part.value]));
      const localAsUtc = Date.UTC(
        Number(byType.year),
        Number(byType.month) - 1,
        Number(byType.day),
        Number(byType.hour),
        Number(byType.minute),
        Number(byType.second)
      );
      return localAsUtc - ms;
    }

    function ceilToHour(ms) {
      return Math.ceil(ms / HOUR_MS) * HOUR_MS;
    }

    function ceilToHalfHour(ms) {
      return Math.ceil(ms / HALF_HOUR_MS) * HALF_HOUR_MS;
    }

    function isHourMark(ms) {
      return ms % HOUR_MS === 0;
    }

    function localDateText(ms) {
      return new Date(ms).toLocaleString('sv-SE', { timeZone: TZ }).slice(0, 10);
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      })[c]);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function interpolate(from, to, pct) {
      return from + (to - from) * pct;
    }
  </script>
</body>
