<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Whidbey Dashboard Tracking</title>
  <style>
    :root {
      --bg: #08111f;
      --card: #0c1a2e;
      --text: #e5eefb;
      --dim: #94a3b8;
      --accent: #38bdf8;
      --danger: #f87171;
      --border: rgba(148,163,184,0.22);
      --ok: #86efac;
      --warn: #facc15;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 1.5rem;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
    }
    header, .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header {
      margin-bottom: 1rem;
    }
    h1 {
      margin: 0;
      color: var(--accent);
      font-size: 1.4rem;
      letter-spacing: 0;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    button, select {
      font: inherit;
      border-radius: 0.4rem;
      border: 1px solid rgba(56,189,248,0.45);
      background: rgba(56,189,248,0.16);
      color: var(--text);
      padding: 0.55rem 0.75rem;
    }
    button {
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      background: rgba(56,189,248,0.24);
    }
    section {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 0.5rem;
      padding: 1rem;
    }
    .status {
      color: var(--dim);
      font-size: 0.85rem;
    }
    .status.error {
      color: var(--danger);
    }
    .event-list {
      display: grid;
      gap: 0.6rem;
      margin-top: 1rem;
    }
    .event-row {
      display: grid;
      grid-template-columns: minmax(10rem, 0.9fr) minmax(8rem, 0.65fr) minmax(10rem, 1fr) minmax(7rem, 0.55fr) minmax(9rem, 0.65fr) minmax(12rem, 1fr);
      gap: 0.65rem;
      align-items: start;
      border: 1px solid var(--border);
      border-radius: 0.45rem;
      padding: 0.7rem;
      background: rgba(255,255,255,0.025);
    }
    .event-row.header {
      color: var(--dim);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
      background: transparent;
    }
    .time {
      font-variant-numeric: tabular-nums;
    }
    .primary {
      font-weight: 700;
    }
    .dim {
      color: var(--dim);
      font-size: 0.82rem;
      overflow-wrap: anywhere;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.12rem 0.45rem;
      font-size: 0.78rem;
      color: var(--dim);
    }
    .pill.admin {
      color: var(--ok);
      border-color: rgba(134,239,172,0.38);
    }
    .pill.public {
      color: var(--warn);
      border-color: rgba(250,204,21,0.34);
    }
    .empty {
      color: var(--dim);
      padding: 1rem 0;
    }
    @media (max-width: 900px) {
      .event-row {
        grid-template-columns: 1fr;
      }
      .event-row.header {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Tracking</h1>
      <nav>
        <a href="/admin">Admin</a>
      </nav>
    </header>

    <section>
      <div class="toolbar">
        <div>
          <button id="refresh" type="button">Refresh</button>
          <select id="limit" aria-label="Event count">
            <option value="100">100 events</option>
            <option value="200" selected>200 events</option>
            <option value="500">500 events</option>
            <option value="1000">1000 events</option>
          </select>
        </div>
        <div id="status" class="status" role="status"></div>
      </div>
      <div class="event-list">
        <div class="event-row header">
          <div>Time</div>
          <div>Event</div>
          <div>Page</div>
          <div>Duration</div>
          <div>IP</div>
          <div>Location / Agent</div>
        </div>
        <div id="events"></div>
      </div>
    </section>
  </main>

  <script>
    const eventsEl = document.getElementById('events');
    const statusEl = document.getElementById('status');
    const refreshButton = document.getElementById('refresh');
    const limitEl = document.getElementById('limit');

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatTime(value) {
      const date = new Date(value);
      if (!Number.isFinite(date.getTime())) return '';
      return date.toLocaleString([], {
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit',
      });
    }

    function formatDuration(ms) {
      const totalSeconds = Math.round((Number(ms) || 0) / 1000);
      if (totalSeconds < 60) return `${totalSeconds}s`;
      const minutes = Math.floor(totalSeconds / 60);
      if (minutes < 60) return `${minutes}m`;
      const hours = Math.floor(minutes / 60);
      const remainder = minutes % 60;
      return remainder ? `${hours}h ${remainder}m` : `${hours}h`;
    }

    function locationText(event = {}) {
      const geo = event.geo || {};
      return [geo.city, geo.region, geo.country].filter(Boolean).join(', ');
    }

    function actorHtml(event = {}) {
      const actor = event.actor || (event.adminEmail ? 'admin' : 'public');
      return `<span class="pill ${escapeHtml(actor)}">${escapeHtml(actor)}</span>`;
    }

    function renderEvent(event = {}) {
      const loc = locationText(event);
      const agent = event.userAgent || '';
      const email = event.adminEmail ? `<div class="dim">${escapeHtml(event.adminEmail)}</div>` : '';
      return `<div class="event-row">
        <div>
          <div class="time">${escapeHtml(formatTime(event.recordedAt))}</div>
          <div class="dim">${escapeHtml(event.recordedAt || '')}</div>
        </div>
        <div>
          <div class="primary">${escapeHtml(event.event || '')}</div>
          ${actorHtml(event)}
          ${email}
        </div>
        <div>
          <div class="primary">${escapeHtml(event.page || '')}</div>
          <div class="dim">${escapeHtml(event.log || '')}</div>
        </div>
        <div class="time">${escapeHtml(formatDuration(event.elapsedMs))}</div>
        <div>
          <div>${escapeHtml(event.ip || '')}</div>
          <div class="dim">${event.privateIp ? 'private' : ''}</div>
        </div>
        <div>
          <div>${escapeHtml(loc || event.error || '')}</div>
          <div class="dim">${escapeHtml(agent)}</div>
        </div>
      </div>`;
    }

    async function loadEvents() {
      statusEl.textContent = 'Loading...';
      statusEl.classList.remove('error');
      refreshButton.disabled = true;
      try {
        const res = await fetch(`/api/analytics/recent?limit=${encodeURIComponent(limitEl.value)}`, {
          credentials: 'same-origin',
        });
        if (!res.ok) {
          if (res.status === 401 || res.status === 403) {
            location.href = '/admin';
            return;
          }
          throw new Error(`HTTP ${res.status}`);
        }
        const data = await res.json();
        const events = Array.isArray(data.events) ? data.events : [];
        eventsEl.innerHTML = events.length ? events.map(renderEvent).join('') : '<div class="empty">No tracking events yet.</div>';
        statusEl.textContent = `Loaded ${events.length} events.`;
      } catch (e) {
        statusEl.textContent = e.message || 'Could not load tracking events.';
        statusEl.classList.add('error');
      } finally {
        refreshButton.disabled = false;
      }
    }

    refreshButton.addEventListener('click', loadEvents);
    limitEl.addEventListener('change', loadEvents);
    loadEvents();
  </script>
</body>
</html>
